<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Upstream Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --border: #E2DDD6;
    --border-light: #EDE9E3;
    --text-primary: #1A1916;
    --text-secondary: #6B6760;
    --text-muted: #A39F99;
    --accent: #2C4A7C;
    --accent-light: #E8EDF5;
    --tag-fp: #7C4A2C;
    --tag-fp-bg: #F5EDE8;
    --tag-mkt: #2C6B3A;
    --tag-mkt-bg: #E8F5EC;
    --tag-en: #6B5A2C;
    --tag-en-bg: #F5F0E8;
    --tag-dom: #2C4A6B;
    --tag-dom-bg: #E8EDF5;
    --tag-other: #555250;
    --tag-other-bg: #EDEAE6;
    --tag-mil: #5C2C2C;
    --tag-mil-bg: #F5E8E8;
    --tag-oil: #2C4A2C;
    --tag-oil-bg: #E8F0E8;
    --zh: #C0392B;
    --rt: #2563A8;
    --gw: #1A7A52;
    --gg: #A0621A;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 0;
  }

  /* ── Masthead ── */
  .masthead {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px 16px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .masthead-left { display: flex; flex-direction: column; gap: 4px; }
  .masthead-title {
    font-family: 'Spectral', serif;
    font-size: 26px;
    font-weight: 500;
    letter-spacing: -0.3px;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .masthead-tag {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--accent);
    color: #fff;
    padding: 3px 8px;
    border-radius: 4px;
    vertical-align: middle;
  }
  .masthead-date {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .masthead-right { display: flex; align-items: center; gap: 10px; }
  .refresh-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--text-secondary);
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .refresh-btn:hover { background: var(--bg); border-color: var(--text-muted); }
  .refresh-btn.spinning { opacity: 0.5; pointer-events: none; }
  .last-refreshed {
    font-size: 11px; color: var(--text-muted);
    white-space: nowrap;
  }

  /* ── Filter bar ── */
  .filter-bar {
    padding: 12px 32px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border-light);
    border-top: 1px solid var(--border-light);
    background: var(--surface);
    flex-wrap: wrap;
  }
  @media (max-width: 600px) {
    .filter-bar { padding: 8px 16px; flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-bar .filter-label { display: none; }
    .filter-bar .article-count { display: none; }
    .filter-bar .search-wrap { flex-shrink: 0; }
    .pill { flex-shrink: 0; }
  }
  .filter-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-right: 4px; }
  .pill {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-secondary);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .pill:hover { border-color: var(--text-muted); color: var(--text-primary); }
  .pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .pill.dimmed { opacity: 0.4; pointer-events: none; }
  .article-count { font-size: 11px; color: var(--text-muted); margin-left: auto; }

  /* ── Search input ── */
  .search-wrap { position: relative; display: flex; align-items: center; margin-left: 8px; }
  .search-icon { position: absolute; left: 9px; width: 13px; height: 13px; pointer-events: none; color: var(--text-muted); }
  .search-input {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--text-primary);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 4px 12px 4px 28px;
    width: 160px;
    outline: none;
    transition: border-color 0.15s, width 0.2s;
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus { border-color: var(--accent); width: 210px; }
  .search-clear {
    position: absolute; right: 8px; background: none; border: none;
    cursor: pointer; font-size: 14px; color: var(--text-muted); line-height: 1;
    display: none; padding: 0;
  }
  .search-clear.visible { display: block; }
  .search-active .search-input { border-color: var(--accent); background: var(--accent-light); }
  mark { background: #FFF176; color: inherit; border-radius: 2px; padding: 0 1px; }

  /* ── Main grid ── */
  .main { padding: 24px 32px 48px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }
  .grid.comfortable {
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  /* ── Layout toggle ── */
  .layout-toggle {
    display: flex; align-items: center;
    border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
  }
  .lt-btn {
    background: none; border: none; cursor: pointer;
    padding: 5px 9px; color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .lt-btn:first-child { border-right: 1px solid var(--border); }
  .lt-btn:hover { background: var(--bg); color: var(--text-secondary); }
  .lt-btn.active { background: var(--accent-light); color: var(--accent); }

  /* ── Drag and drop ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: box-shadow 0.15s, opacity 0.15s, transform 0.15s;
    cursor: default;
  }
  .card.dragging { opacity: 0.4; transform: scale(0.98); }
  .card.drag-over { box-shadow: 0 0 0 2px var(--accent); }
  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-light);
    cursor: grab;
    user-select: none;
  }
  .card-header:active { cursor: grabbing; }
  .drag-handle {
    display: flex; flex-direction: column; gap: 2px;
    margin-right: 2px; opacity: 0.3; flex-shrink: 0;
  }
  .drag-handle span {
    display: block; width: 14px; height: 1.5px;
    background: var(--text-primary); border-radius: 1px;
  }
  /* ── Bias badge ── */
  .bias-badge {
    font-size: 9px; font-weight: 500;
    padding: 2px 7px; border-radius: 99px;
    letter-spacing: 0.03em;
    cursor: pointer; white-space: nowrap;
    border: 1px solid transparent;
    transition: opacity 0.15s;
    margin-left: auto;
  }
  .bias-badge:hover { opacity: 0.75; }
  .bias-edit-wrap { position: relative; margin-left: auto; }
  .bias-input {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; padding: 2px 7px;
    border: 1px solid var(--border); border-radius: 99px;
    background: var(--bg); color: var(--text-primary);
    outline: none; width: 130px;
  }
  .bias-input:focus { border-color: var(--accent); }

  .source-bar { width: 3px; height: 18px; border-radius: 2px; flex-shrink: 0; }
  .card-title { font-size: 13px; font-weight: 500; color: var(--text-primary); }
  .card-count { font-size: 11px; color: var(--text-muted); margin-left: auto; }
  .visit-link { font-size: 11px; color: var(--accent); text-decoration: none; margin-left: 6px; }
  .visit-link:hover { text-decoration: underline; }

  /* ── Articles ── */
  .articles { flex: 1; }
  .article {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border-light);
    cursor: pointer;
    transition: background 0.1s;
    text-decoration: none;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    color: inherit;
  }
  .article:last-child { border-bottom: none; }
  .article:hover { background: var(--bg); }
  .article-dot-wrap { padding-top: 3px; width: 8px; flex-shrink: 0; }
  .article-new-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--gw);
    display: block;
  }
  .article-body { flex: 1; min-width: 0; }
  .article-title {
    font-size: 13px;
    line-height: 1.45;
    color: var(--text-primary);
    margin-bottom: 4px;
    font-weight: 400;
  }
  .article-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .article-time { font-size: 11px; color: var(--text-muted); }
  .article-abs  { font-size: 11px; color: var(--text-muted); margin-left: 4px; opacity: 0.7; }
  .badge {
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 99px;
    font-weight: 400;
  }
  .badge-fp  { background: var(--tag-fp-bg);    color: var(--tag-fp); }
  .badge-mkt { background: var(--tag-mkt-bg);   color: var(--tag-mkt); }
  .badge-en  { background: var(--tag-en-bg);    color: var(--tag-en); }
  .badge-dom { background: var(--tag-dom-bg);   color: var(--tag-dom); }
  .badge-other { background: var(--tag-other-bg); color: var(--tag-other); }
  .badge-mil { background: var(--tag-mil-bg);   color: var(--tag-mil); }
  .badge-oil { background: var(--tag-oil-bg);   color: var(--tag-oil); }

  /* ── States ── */
  .state-msg {
    padding: 28px 16px;
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.6;
  }
  .state-msg a { color: var(--accent); }
  .state-msg.error { color: #C0392B; }

  /* ── Scrollable card body ── */
  .articles-wrap { max-height: 276px; overflow-y: auto; }
  .articles-wrap::-webkit-scrollbar { width: 4px; }
  .articles-wrap::-webkit-scrollbar-track { background: transparent; }
  .articles-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (max-width: 600px) {
    .masthead, .filter-bar, .main { padding-left: 16px; padding-right: 16px; }
    .masthead-title { font-size: 20px; }
    #layout-toggle { display: none; }

  }

  /* ── Breaking news bar ── */
  .breaking-bar {
    display: none;
    background: #7B1F1F;
    color: #fff;
    padding: 7px 32px;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    position: relative;
    z-index: 90;
    animation: breakingFadeIn 0.3s ease;
  }
  .breaking-bar.visible { display: flex; }
  @keyframes breakingFadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .breaking-label {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    background: rgba(255,255,255,0.15);
    padding: 2px 8px; border-radius: 3px;
    white-space: nowrap; flex-shrink: 0;
  }
  .breaking-text {
    flex: 1; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
    font-weight: 400;
  }
  .breaking-link {
    color: #fff; text-decoration: none;
    flex: 1; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .breaking-link:hover { text-decoration: underline; }
  .breaking-source {
    font-size: 11px; opacity: 0.75;
    white-space: nowrap; flex-shrink: 0;
  }
  .breaking-dismiss {
    background: none; border: none; color: #fff;
    font-size: 16px; cursor: pointer; opacity: 0.5;
    padding: 0 0 0 8px; flex-shrink: 0; line-height: 1;
  }
  .breaking-dismiss:hover { opacity: 0.9; }
  .breaking-more {
    background: rgba(255,255,255,0.15); border: none; color: #fff;
    font-size: 11px; font-weight: 600; cursor: pointer;
    padding: 2px 8px; border-radius: 3px; white-space: nowrap;
    flex-shrink: 0; transition: background 0.15s;
  }
  .breaking-more:hover { background: rgba(255,255,255,0.25); }
  .breaking-dropdown {
    display: none;
    position: fixed; left: 0; right: 0;
    background: #5C1717; border-top: 1px solid rgba(255,255,255,0.1);
    z-index: 999; max-height: 320px; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .breaking-dropdown.open { display: block; }
  .breaking-drop-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 9px 32px; border-bottom: 1px solid rgba(255,255,255,0.08);
    text-decoration: none; color: #fff; transition: background 0.1s;
  }
  .breaking-drop-item:hover { background: rgba(255,255,255,0.08); }
  .breaking-drop-item:last-child { border-bottom: none; }
  .breaking-drop-title { font-size: 12px; flex: 1; line-height: 1.4; }
  .breaking-drop-meta { font-size: 11px; opacity: 0.65; white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
  .breaking-top    { display: contents; }
  .breaking-bottom  { display: contents; }
  @media (max-width: 600px) {
    .breaking-bar { padding: 7px 16px 8px; flex-direction: column; align-items: stretch; gap: 5px; }
    .breaking-top { display: flex; align-items: center; gap: 8px; width: 100%; }
    .breaking-top .breaking-label { flex-shrink: 0; }
    .breaking-top .breaking-link { flex: 1; white-space: normal; overflow: visible; text-overflow: unset; font-size: 12px; line-height: 1.35; }
    .breaking-bottom { display: flex; align-items: center; gap: 6px; width: 100%; }
    .breaking-bottom .breaking-source { flex: 1; font-size: 10px; }
    .breaking-bottom .breaking-dismiss { margin-left: auto; }
    .breaking-drop-item { padding: 9px 16px; }
    .breaking-dropdown { position: relative !important; top: auto !important; max-height: 260px; overflow-y: auto; }
  }

  /* ── Trending section ── */
  .trending-section {
    padding: 20px 32px 4px;
    border-bottom: 1px solid var(--border-light);
  }
  .trending-header {
    display: flex; align-items: baseline; gap: 12px; margin-bottom: 14px;
    cursor: pointer; user-select: none;
  }
  .trending-header:hover .trending-title { opacity: 0.75; }
  /* ── Trending new-stories indicator ── */
  .trending-collapse-btn { position: relative; }
  .trending-new-dot {
    position: absolute; top: -3px; right: -8px;
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--gw); display: none;
  }
  .trending-new-dot.visible { display: block; }

  .trending-collapse-btn {
    margin-left: auto; font-size: 11px; color: var(--text-muted);
    background: none; border: none; cursor: pointer; padding: 0;
    font-family: 'DM Sans', sans-serif; flex-shrink: 0;
  }
  .trending-collapsed-badge {
    display: none;
    font-size: 10px; font-weight: 500;
    background: var(--accent-light); color: var(--accent);
    padding: 2px 8px; border-radius: 99px;
    white-space: nowrap;
  }
  .trending-section.collapsed .trending-collapsed-badge { display: inline; }
  .trending-section.collapsed .trending-sub { display: none; }
  .trending-title {
    font-family: 'Spectral', serif;
    font-size: 15px; font-weight: 500; color: var(--text-primary);
    text-transform: uppercase; letter-spacing: 0.06em; font-size: 11px;
  }
  .trending-sub { font-size: 11px; color: var(--text-muted); }
  .clusters {
    display: flex; gap: 14px; overflow-x: auto; padding-bottom: 16px;
    scrollbar-width: thin;
  }
  .clusters::-webkit-scrollbar { height: 3px; }
  .clusters::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .cluster-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
    min-width: 260px; max-width: 300px; flex-shrink: 0;
    border-top: 3px solid var(--accent);
  }
  .cluster-topic {
    font-size: 13px; font-weight: 500; color: var(--text-primary);
    margin-bottom: 4px; line-height: 1.3;
  }
  .cluster-meta {
    font-size: 11px; color: var(--text-muted); margin-bottom: 10px;
    display: flex; gap: 8px; align-items: center;
  }
  .cluster-source-count {
    background: var(--accent-light); color: var(--accent);
    font-size: 10px; font-weight: 500;
    padding: 1px 7px; border-radius: 99px;
  }
  .cluster-headlines { display: flex; flex-direction: column; gap: 6px; }
  .cluster-headline {
    display: flex; gap: 7px; align-items: flex-start;
    text-decoration: none; color: inherit;
    padding: 5px 7px; border-radius: 6px; margin: 0 -7px;
    transition: background 0.1s;
  }
  .cluster-headline:hover { background: var(--bg); }
  .cluster-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .cluster-hl-text { font-size: 12px; color: var(--text-secondary); line-height: 1.4; }
  .cluster-hl-source { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

  /* ── Cluster bias enhancements ── */
  .cluster-spectrum {
    display: flex; gap: 3px; align-items: center;
    margin-bottom: 10px; height: 5px; border-radius: 99px; overflow: hidden;
  }
  .cluster-spectrum-seg {
    height: 100%; border-radius: 99px; flex-shrink: 0;
  }
  .cluster-coverage {
    font-size: 10px; color: var(--text-muted);
    margin-bottom: 8px; letter-spacing: 0.03em;
    display: flex; align-items: center; gap: 5px; flex-wrap: wrap;
  }
  .cluster-coverage-pip {
    display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; flex-shrink: 0;
  }
  .cluster-hl-bias {
    font-size: 9px; color: var(--text-muted);
    opacity: 0.75; margin-left: 3px; white-space: nowrap;
  }
  .cluster-more-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; color: var(--accent);
    background: var(--accent-light); border: none;
    border-radius: 99px; padding: 3px 10px;
    cursor: pointer; margin-top: 6px;
    transition: background 0.15s;
  }
  .cluster-more-btn:hover { background: #d8e4f5; }

  /* ── Cluster source pills ── */
  .cluster-source-pills {
    display: flex; flex-wrap: wrap; gap: 4px;
    margin-bottom: 8px;
  }
  .cluster-source-pill {
    font-size: 9px; font-weight: 600;
    letter-spacing: 0.04em;
    padding: 1px 6px; border-radius: 99px;
    white-space: nowrap; opacity: 0.85;
    border: 1px solid transparent;
  }


  /* ── Manage sources panel ── */
  .manage-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; color: var(--text-secondary);
    background: none; border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 14px;
    cursor: pointer; transition: all 0.15s;
  }
  .manage-btn:hover { background: var(--bg); border-color: var(--text-muted); }
  .manage-btn.open { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
  @media (max-width: 600px) {
    .manage-btn { padding: 5px 10px; font-size: 11px; }
    .manage-btn.open { background: none; color: var(--text-secondary); border-color: var(--border); }
  }
  .sources-panel {
    display: none;
    position: absolute; top: calc(100% + 4px); right: 32px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    z-index: 200; min-width: 280px;
    padding: 12px 0;
    max-height: calc(100vh - 120px);
    overflow-y: auto;
  }
  .sources-panel.visible { display: block; }
  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 16px 10px; border-bottom: 1px solid var(--border-light);
    margin-bottom: 4px;
  }
  .panel-title { font-size: 11px; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.06em; }
  .panel-all-btn { font-size: 11px; color: var(--accent); background: none; border: none; cursor: pointer; padding: 0; }
  .panel-all-btn:hover { text-decoration: underline; }
  .source-row {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 16px; cursor: pointer; transition: background 0.1s;
  }
  .source-row:hover { background: var(--bg); }
  .src-order-btns { display: flex; flex-direction: column; gap: 1px; margin-right: 4px; }
  .src-order-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); font-size: 10px; line-height: 1;
    padding: 1px 3px; border-radius: 3px; transition: color 0.1s, background 0.1s;
  }
  .src-order-btn:hover:not(:disabled) { color: var(--accent); background: var(--accent-light); }
  .src-order-btn:disabled { opacity: 0.2; cursor: default; }
  .source-row-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .source-row-name { font-size: 13px; color: var(--text-primary); flex: 1; }
  .src-toggle {
    position: relative; width: 28px; height: 16px;
    background: var(--border); border: none; border-radius: 99px;
    cursor: pointer; padding: 0; flex-shrink: 0; transition: background 0.2s;
  }
  .src-toggle.on { background: var(--accent); }
  .src-toggle-knob {
    position: absolute; top: 2px; left: 2px;
    width: 12px; height: 12px; border-radius: 50%;
    background: #fff; transition: transform 0.2s; display: block;
  }
  .src-toggle.on .src-toggle-knob { transform: translateX(12px); }
  .group-header-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px 4px;
    border-top: 1px solid var(--border-light);
    margin-top: 4px; gap: 8px;
  }
  .group-header-row:first-child { border-top: none; margin-top: 0; }
  .group-header-label {
    font-size: 10px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.07em; color: var(--text-muted); flex: 1;
  }
  .group-header-count { font-size: 11px; color: var(--text-muted); }
  .group-toggle-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px; padding: 2px 8px;
    border-radius: 4px; border: 1px solid var(--border);
    background: none; cursor: pointer; color: var(--text-muted);
    transition: all 0.15s; white-space: nowrap;
  }
  .group-toggle-btn:hover { background: var(--bg); color: var(--text-secondary); border-color: var(--text-muted); }
  .group-toggle-btn.all-on { color: var(--accent); border-color: var(--accent); background: var(--accent-light); }

  /* ── Panel mode toggle ── */
  .panel-mode-btns { display: flex; gap: 4px; align-items: center; }
  .panel-mode-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; padding: 3px 10px;
    border-radius: 6px; border: 1px solid var(--border);
    background: none; cursor: pointer;
    color: var(--text-secondary); transition: all 0.15s;
  }
  .panel-mode-btn:hover { background: var(--bg); }
  .panel-mode-btn.active { background: var(--accent-light); color: var(--accent); border-color: var(--accent); font-weight: 500; }
  .panel-done-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; padding: 3px 10px;
    border-radius: 6px; border: 1px solid var(--accent);
    background: var(--accent); cursor: pointer;
    color: #fff; font-weight: 500; transition: opacity 0.15s;
  }
  .panel-done-btn:hover { opacity: 0.85; }

  /* ── Reorder mode ── */
  .src-group-tag {
    font-size: 9px; color: var(--text-muted);
    background: var(--bg); border: 1px solid var(--border-light);
    border-radius: 3px; padding: 1px 5px;
    flex-shrink: 0; white-space: nowrap;
  }
  .panel-reorder-hint {
    font-size: 11px; color: var(--text-muted);
    text-align: center; padding: 8px 16px;
    border-top: 1px solid var(--border-light);
    font-style: italic;
  }

  /* ── Weather widget ── */
  .weather-widget {
    display: flex; align-items: center; gap: 10px;
    font-size: 12px; color: var(--text-secondary);
    white-space: nowrap; margin-left: auto;
    padding-left: 16px;
    border-left: 1px solid var(--border-light);
  }
  .weather-temp {
    font-size: 16px; font-weight: 500;
    color: var(--text-primary); line-height: 1;
  }
  .weather-icon { font-size: 16px; line-height: 1; }
  .weather-detail { display: flex; flex-direction: column; gap: 1px; }
  .weather-hi-lo { font-size: 11px; color: var(--text-muted); }
  .weather-precip { font-size: 11px; color: var(--accent); }
  @media (max-width: 600px) { .weather-widget { display: none; } }

  /* ── Weather location popover ── */
  .weather-widget { cursor: pointer; position: relative; }
  .weather-widget:hover .weather-temp { text-decoration: underline dotted; }
  .weather-popover {
    display: none; position: absolute;
    top: calc(100% + 10px); right: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    padding: 14px 16px; z-index: 300; min-width: 220px;
  }
  .weather-popover.open { display: block; }
  .weather-pop-title {
    font-size: 11px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.07em; color: var(--text-muted); margin-bottom: 8px;
  }
  .weather-pop-row { display: flex; gap: 6px; align-items: center; }
  .weather-pop-input {
    font-family: 'DM Sans', sans-serif; font-size: 12px;
    border: 1px solid var(--border); border-radius: 6px;
    padding: 5px 10px; flex: 1; outline: none;
    background: var(--bg); color: var(--text-primary);
    transition: border-color 0.15s;
  }
  .weather-pop-input:focus { border-color: var(--accent); }
  .weather-pop-btn {
    font-family: 'DM Sans', sans-serif; font-size: 12px;
    background: var(--accent); color: #fff; border: none;
    border-radius: 6px; padding: 5px 12px; cursor: pointer;
    transition: opacity 0.15s; white-space: nowrap;
  }
  .weather-pop-btn:hover { opacity: 0.85; }
  .weather-pop-status {
    font-size: 11px; color: var(--text-muted);
    margin-top: 7px; min-height: 14px;
  }
  .weather-pop-status.error { color: #C0392B; }
  .weather-loc-name {
    font-size: 10px; color: var(--text-muted);
    margin-top: 2px; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; max-width: 140px;
  }

  /* ── Bible verse floating pill ── */
  .verse-pill {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 500;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }
  .verse-pill-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 5px 12px;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .verse-pill-btn:hover { border-color: var(--text-muted); color: var(--text-secondary); }
  .verse-card {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.10);
    padding: 14px 16px;
    max-width: 320px;
    animation: verseFadeIn 0.2s ease;
  }
  .verse-card.open { display: block; }
  @keyframes verseFadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .verse-label {
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-muted); display: block; margin-bottom: 7px;
  }
  .verse-text {
    font-family: 'Spectral', serif;
    font-size: 13px; color: var(--text-secondary);
    line-height: 1.6; font-style: italic; display: block;
    margin-bottom: 7px;
  }
  .verse-ref {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; color: var(--text-muted);
    white-space: nowrap; display: block; text-align: right;
  }
  @media (max-width: 600px) {
    .verse-pill { bottom: 14px; right: 14px; }
    .verse-card { max-width: calc(100vw - 40px); }
  }

  /* ── Market data strip ── */
  .market-strip {
    background: #1A1916;
    border-bottom: 1px solid #2C2A26;
    padding: 0 32px;
    display: flex;
    align-items: stretch;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
    min-height: 36px;
  }
  .market-strip::-webkit-scrollbar { display: none; }

  .market-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 16px;
    border-right: 1px solid #2C2A26;
    white-space: nowrap;
    min-height: 36px;
    flex-shrink: 0;
  }
  .market-item:first-child { padding-left: 0; }
  .market-item:last-child  { border-right: none; }

  .market-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #C8C4BE;
  }
  .market-price {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: #FFFFFF;
    letter-spacing: 0.01em;
  }
  .market-change {
    font-size: 11px;
    font-weight: 400;
    padding: 1px 5px;
    border-radius: 3px;
  }
  .market-change.up   { color: #2ECC71; background: rgba(46,204,113,0.12); }
  .market-change.down { color: #E74C3C; background: rgba(231,76,60,0.12);  }
  .market-change.flat { color: #6B6760; background: transparent; }

  .market-divider {
    width: 1px;
    background: #2C2A26;
    align-self: stretch;
  }

  /* EIA inventory pill */
  .eia-pill {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 3px;
    letter-spacing: 0.02em;
  }
  .eia-pill.draw  { color: #2ECC71; background: rgba(46,204,113,0.12); }
  .eia-pill.build { color: #E74C3C; background: rgba(231,76,60,0.12);  }

  /* Rig count mini-sparkline */
  .rig-spark {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 14px;
  }
  .rig-spark-bar {
    width: 3px;
    background: #4A4A4A;
    border-radius: 1px;
    transition: background 0.2s;
  }
  .rig-spark-bar.current { background: #F7F5F0; }

  .market-loading { color: #4A4A4A; font-size: 11px; }
  .market-error   { color: #6B3030; font-size: 11px; }

  @media (max-width: 600px) {
    .market-strip { padding: 0 0 0 16px; }
    .market-item { flex-direction: column; align-items: flex-start; justify-content: center; gap: 1px; padding: 6px 14px 6px 0; min-width: 82px; }
    .market-item:first-child { padding-left: 0; }
    .market-label { font-size: 9px; }
    .market-price { font-size: 13px; }
    .market-change { font-size: 10px; }
    .eia-pill { font-size: 10px; }
  }

  /* ── Stock strip ── */
  .stock-strip-wrap {
    position: relative;
    background: #1F1D1A;
    border-bottom: 1px solid #2C2A26;
  }
  .stock-strip {
    padding: 0 32px;
    padding-right: 52px;
    display: flex;
    align-items: stretch;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
    min-height: 34px;
  }
  .stock-strip::-webkit-scrollbar { display: none; }
  .stock-item {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 0 14px;
    border-right: 1px solid #2C2A26;
    white-space: nowrap;
    min-height: 34px;
    flex-shrink: 0;
  }
  .stock-item:first-child { padding-left: 0; }
  .stock-symbol { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; color: #C8C4BE; }
  .stock-price  { font-size: 13px; font-weight: 500; color: #FFFFFF; }
  .stock-change { font-size: 11px; padding: 1px 5px; border-radius: 3px; }
  .stock-change.up   { color: #2ECC71; background: rgba(46,204,113,0.12); }
  .stock-change.down { color: #E74C3C; background: rgba(231,76,60,0.12); }
  .stock-change.flat { color: #6B6760; background: transparent; }
  .stock-add-btn {
    position: absolute; right: 0; top: 0; bottom: 0;
    display: flex; align-items: center;
    padding: 0 14px;
    background: #1F1D1A; border: none; border-left: 1px solid #2C2A26;
    color: #6B6760; font-size: 16px; cursor: pointer;
    z-index: 2; transition: color 0.15s;
  }
  .stock-add-btn:hover { color: #C8C4BE; }
  /* Fade gradient hinting more content to the left of the button */
  .stock-strip-wrap::before {
    content: '';
    position: absolute; right: 48px; top: 0; bottom: 0;
    width: 40px;
    background: linear-gradient(to right, transparent, #1F1D1A);
    pointer-events: none; z-index: 1;
  }
  .stock-strip { cursor: grab; }
  .stock-strip.grabbing { cursor: grabbing; user-select: none; }
  .stock-popover {
    display: none; position: fixed; right: 16px;
    background: #1A1916; border: 1px solid #3A3835;
    border-radius: 10px; box-shadow: 0 -4px 20px rgba(0,0,0,0.4);
    padding: 14px 16px 16px; z-index: 400; min-width: 260px;
    max-height: calc(100vh - 24px); overflow-y: auto;
  }
  .stock-popover.open { display: block; }
  .stock-pop-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #6B6760; margin-bottom: 10px; }
  .stock-pop-row { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; }
  .stock-pop-input {
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    background: #2C2A26; border: 1px solid #4A4845;
    border-radius: 6px; padding: 7px 10px; flex: 1;
    outline: none; color: #FFFFFF; text-transform: uppercase;
    -webkit-text-fill-color: #FFFFFF;
    transition: border-color 0.15s;
    appearance: none; -webkit-appearance: none;
  }
  .stock-pop-input:focus { border-color: #4A7C3F; }
  .stock-pop-input::placeholder { color: #4A4845; text-transform: none; -webkit-text-fill-color: #4A4845; }
  .stock-pop-btn {
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    background: #2C4A7C; color: #fff; border: none;
    border-radius: 6px; padding: 7px 14px; cursor: pointer;
    transition: opacity 0.15s; white-space: nowrap;
  }
  .stock-pop-btn:hover { opacity: 0.85; }
  .stock-pop-status { font-size: 11px; color: #6B6760; min-height: 14px; margin-bottom: 8px; }
  .stock-pop-status.error { color: #E74C3C; }
  /* Sort controls */
  .stock-sort-row { display: flex; gap: 4px; align-items: center; margin-bottom: 10px; }
  .stock-sort-label { font-size: 10px; color: #4A4845; text-transform: uppercase; letter-spacing: 0.06em; flex-shrink: 0; }
  .stock-sort-btn {
    font-family: 'DM Sans', sans-serif; font-size: 11px;
    background: #2C2A26; border: 1px solid #3A3835;
    border-radius: 4px; padding: 3px 8px; cursor: pointer;
    color: #6B6760; transition: all 0.15s; white-space: nowrap;
  }
  .stock-sort-btn:hover { color: #C8C4BE; border-color: #4A4845; }
  .stock-sort-btn.active { background: #2C4A7C; border-color: #2C4A7C; color: #fff; }
  .stock-pop-list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .stock-pop-list-label { font-size: 10px; color: #4A4845; text-transform: uppercase; letter-spacing: 0.06em; }
  .stock-pop-list { display: flex; flex-direction: column; gap: 2px; max-height: 180px; overflow-y: auto; }
  .stock-pop-ticker { display: flex; align-items: center; justify-content: space-between; padding: 5px 8px; border-radius: 6px; transition: background 0.1s; }
  .stock-pop-ticker:hover { background: #2C2A26; }
  .stock-pop-name { font-size: 12px; color: #C8C4BE; font-weight: 500; }
  .stock-pop-remove { background: none; border: none; color: #4A4845; font-size: 14px; cursor: pointer; padding: 0 2px; line-height: 1; transition: color 0.15s; }
  .stock-pop-remove:hover { color: #E74C3C; }
  @media (max-width: 600px) {
    .stock-strip { padding: 0 52px 0 16px; }
    .stock-item { padding: 0 12px 0 0; min-width: 72px; flex-direction: column; align-items: flex-start; justify-content: center; gap: 1px; }
    .stock-symbol { font-size: 9px; }
    .stock-price  { font-size: 12px; }
    .stock-change { font-size: 10px; }
  }
</style>
</head>
<body>

<div class="masthead">
  <div class="masthead-left">
    <div class="masthead-title">Upstream Intelligence <span class="masthead-tag">Live Feed</span></div>
    <div class="masthead-date" id="date-display"></div>
  </div>
  <div class="masthead-right">
    <span class="article-count" id="total-count"></span>
    <button class="manage-btn" id="manage-btn" onclick="togglePanel()">⚙ Sources</button>
    <div class="layout-toggle" id="layout-toggle" title="Toggle layout density">
      <button class="lt-btn active" id="lt-compact" onclick="setLayout('compact')">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
          <rect x="0" y="0" width="4" height="4" rx="1"/><rect x="5" y="0" width="4" height="4" rx="1"/><rect x="10" y="0" width="4" height="4" rx="1"/>
          <rect x="0" y="5" width="4" height="4" rx="1"/><rect x="5" y="5" width="4" height="4" rx="1"/><rect x="10" y="5" width="4" height="4" rx="1"/>
          <rect x="0" y="10" width="4" height="4" rx="1"/><rect x="5" y="10" width="4" height="4" rx="1"/><rect x="10" y="10" width="4" height="4" rx="1"/>
        </svg>
      </button>
      <button class="lt-btn" id="lt-comfortable" onclick="setLayout('comfortable')">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
          <rect x="0" y="0" width="6" height="6" rx="1"/><rect x="8" y="0" width="6" height="6" rx="1"/>
          <rect x="0" y="8" width="6" height="6" rx="1"/><rect x="8" y="8" width="6" height="6" rx="1"/>
        </svg>
      </button>
    </div>
    <button class="refresh-btn" id="refresh-btn" onclick="loadAll()">↻ Refresh</button>
    <span class="last-refreshed" id="last-refreshed"></span>
  </div>

  <div class="sources-panel" id="sources-panel">
    <div class="panel-header">
      <span class="panel-title" id="panel-title">Visible sources</span>
      <div class="panel-mode-btns">
        <button class="panel-all-btn" id="panel-all-btn" onclick="toggleAllSources()">Toggle all</button>
        <button class="panel-mode-btn active" id="panel-manage-btn" onclick="setPanelMode('manage')">Manage</button>
        <button class="panel-mode-btn" id="panel-reorder-btn" onclick="setPanelMode('reorder')">Reorder</button>
      </div>
    </div>
    <div id="sources-panel-list"></div>
  </div>
</div>

<div class="verse-pill" id="verse-pill">
  <div class="verse-card" id="verse-card">
    <span class="verse-label">✦ Verse of the Day</span>
    <span class="verse-text" id="verse-text">Loading…</span>
    <span class="verse-ref" id="verse-ref"></span>
  </div>
  <button class="verse-pill-btn" id="verse-pill-btn" onclick="toggleVersePill()">✦ Verse</button>
</div>

<div class="filter-bar">
  <span class="filter-label">Filter</span>
  <button class="pill active" data-f="all"      onclick="setFilter('all')">All</button>
  <button class="pill"        data-f="fp"       onclick="setFilter('fp')">Foreign policy</button>
  <button class="pill"        data-f="markets"  onclick="setFilter('markets')">Markets</button>
  <button class="pill"        data-f="energy"   onclick="setFilter('energy')">Energy</button>
  <button class="pill"        data-f="domestic" onclick="setFilter('domestic')">US Politics</button>
  <button class="pill"        data-f="military" onclick="setFilter('military')">Military / Defense</button>
  <button class="pill"        data-f="oil"      onclick="setFilter('oil')">Upstream / E&P</button>
  <div class="search-wrap" id="search-wrap">
    <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="6.5" cy="6.5" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/>
    </svg>
    <input class="search-input" id="search-input" type="text" placeholder="Search headlines…" oninput="onSearch(this.value)" />
    <button class="search-clear" id="search-clear" onclick="clearSearch()" title="Clear">×</button>
  </div>
  <div class="weather-widget" id="weather-widget" onclick="toggleWeatherPopover(event)" title="Click to change location">
    <span class="weather-icon" id="weather-icon">⋯</span>
    <div class="weather-detail">
      <span class="weather-temp" id="weather-temp">—°</span>
      <span class="weather-hi-lo" id="weather-hi-lo">H —° · L —°</span>
      <span class="weather-precip" id="weather-precip"></span>
      <span class="weather-loc-name" id="weather-loc-name"></span>
    </div>
    <div class="weather-popover" id="weather-popover" onclick="event.stopPropagation()">
      <div class="weather-pop-title">📍 Change location</div>
      <div class="weather-pop-row">
        <input class="weather-pop-input" id="weather-loc-input" type="text"
          placeholder="City or zip code…"
          onkeydown="if(event.key==='Enter')saveWeatherLocation()" />
        <button class="weather-pop-btn" onclick="saveWeatherLocation()">Go</button>
      </div>
      <div class="weather-pop-status" id="weather-pop-status"></div>
    </div>
  </div>
</div>

<div class="market-strip" id="market-strip">
  <!-- WTI -->
  <div class="market-item">
    <span class="market-label">WTI</span>
    <span class="market-price" id="ms-wti-price"><span class="market-loading">⋯</span></span>
    <span class="market-change flat" id="ms-wti-chg"></span>
  </div>
  <!-- Brent -->

// ── Breaking news seen/new tracking ──
//
// Two independent localStorage buckets control what surfaces in the breaking bar:
//
//   SEEN_KEY  — articles the user explicitly dismissed via "✓ Seen".
//               Stored as { url: timestamp } so entries auto-expire after 48 hours,
//               preventing permanent suppression of articles that reappear or share a URL.
//
//   PREV_KEY  — snapshot of every article link present at the END of the last full
//               refresh cycle. On the next refresh, any link already in this set is
//               treated as "not new" and filtered out of breaking candidates.
//               Written once in batch (in loadAll) after ALL feeds settle — never
//               per-feed — so sibling feeds loading in parallel can't poison each
//               other's novelty check during the same refresh cycle.

const SEEN_KEY = 'upstream_seen_links';
const PREV_KEY = 'upstream_prev_links';

function loadSeenLinks() {
  try {
    const raw = JSON.parse(localStorage.getItem(SEEN_KEY));
    if (!raw) return new Set();
    const cutoff = Date.now() - 48 * 60 * 60 * 1000; // 48-hour TTL

    // One-time migration: old format was a plain string[], new format is {link: timestamp}.
    // Stamp migrated entries with now so they survive this session before expiring normally.
    if (Array.isArray(raw)) {
      const migrated = {};
      raw.forEach(link => { migrated[link] = Date.now(); });
      localStorage.setItem(SEEN_KEY, JSON.stringify(migrated));
      return new Set(raw);
    }

    // Prune expired entries on every load and re-persist the trimmed set
    const fresh = {};
    Object.entries(raw).forEach(([link, ts]) => { if (ts > cutoff) fresh[link] = ts; });
    localStorage.setItem(SEEN_KEY, JSON.stringify(fresh));
    return new Set(Object.keys(fresh));
  } catch(e) { return new Set(); }
}

function saveSeenLinks(s) {
  // Merge into existing store so we don't overwrite timestamps for links already recorded
  try {
    let existing = {};
    try { const r = JSON.parse(localStorage.getItem(SEEN_KEY)); if (r && !Array.isArray(r)) existing = r; } catch(e) {}
    const now = Date.now();
    s.forEach(link => { if (!existing[link]) existing[link] = now; });
    localStorage.setItem(SEEN_KEY, JSON.stringify(existing));
  } catch(e) {}
}

// prevLinks is a plain Set<string> — no TTL needed because it's cleared and
// rewritten from scratch on every refresh (see loadAll).
function loadPrevLinks() {
  try { return new Set(JSON.parse(localStorage.getItem(PREV_KEY)) || []); } catch(e) { return new Set(); }
}
function savePrevLinks(s) {
  try { localStorage.setItem(PREV_KEY, JSON.stringify([...s])); } catch(e) {}
}

    ]
  : [
  // 1. rss2json — clean URL only, no extra params (unknown params break free tier)
  feedUrl => ({
    url: `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}`,
    parse: async res => {
      const j = await res.json();
      if (j.status !== 'ok' || !j.items?.length) throw new Error('empty');
      return j.items.map(i => ({
        title: i.title || '',
        link: i.link || i.url || '',
        pubDate: i.pubDate || i.published || i.date || i.updated || '',
        desc: (i.description || i.content || '').replace(/<[^>]+>/g, ''),
      }));
    }
  }),
  // 2. corsproxy.io — raw XML fetch
  feedUrl => ({
    url: `https://corsproxy.io/?${encodeURIComponent(feedUrl)}`,
    parse: async res => parseXML(await res.text())
  }),
  // 3. allorigins — raw XML fetch
  feedUrl => ({
    url: `https://api.allorigins.win/raw?url=${encodeURIComponent(feedUrl)}`,
    parse: async res => parseXML(await res.text())
  }),
];

function parseXML(text) {
  const doc = new DOMParser().parseFromString(text, 'text/xml');
  const items = [...doc.querySelectorAll('item')];
  if (!items.length) throw new Error('no items');
  return items.map(el => {
    const get = tag => el.querySelector(tag)?.textContent?.trim() || '';
    return {
      title: get('title'),
      link: get('link') || el.querySelector('link')?.getAttribute('href') || '',
      pubDate: get('pubDate') || get('published') || get('dc\:date') || get('updated') || get('date'),
      desc: get('description').replace(/<[^>]+>/g, ''),
    };
  }).filter(i => i.title);
}

function tagItem(title, desc) {
  const t = (title + ' ' + (desc||'')).toLowerCase();
  return {
    fp:  FP_KW.some(k  => t.includes(k)),
    mkt: MKT_KW.some(k => t.includes(k)),
    en:  EN_KW.some(k  => t.includes(k)),
    dom: DOM_KW.some(k => t.includes(k)),
    mil: MIL_KW.some(k => t.includes(k)),
    oil: UPSTREAM_KW.some(k => t.includes(k)),
  };
}

function passesFilter(item) {
  const tg = tagItem(item.title, item.desc);
  const text = (item.title + ' ' + (item.desc||'')).toLowerCase();

  // Whole word matching — "war" matches "war" but not "warns" or "award"
  const escaped = searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const wordMatch = new RegExp(`\\b${escaped}`, 'i');
  const matchesSearch = !searchQuery || wordMatch.test(item.title + ' ' + (item.desc||''));
  const matchesPill =
    activeFilter === 'all'      ? true :
    activeFilter === 'fp'       ? tg.fp  :
    activeFilter === 'markets'  ? tg.mkt :
    activeFilter === 'energy'   ? tg.en  :
    activeFilter === 'domestic' ? tg.dom :
    activeFilter === 'military' ? tg.mil :
    activeFilter === 'oil'      ? tg.oil : true;

  return matchesSearch && matchesPill;
}

function highlight(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(\\b${escaped})`, 'gi'), '<mark>$1</mark>');
}

function onSearch(val) {
  searchQuery = val.trim().toLowerCase();
  const clearBtn = document.getElementById('search-clear');
  const wrap = document.getElementById('search-wrap');
  clearBtn.classList.toggle('visible', searchQuery.length > 0);
  wrap.classList.toggle('search-active', searchQuery.length > 0);
  renderAll();
  renderClusters();
}

function clearSearch() {
  searchQuery = '';
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').classList.remove('visible');
  document.getElementById('search-wrap').classList.remove('search-active');
  renderAll();
  renderClusters();
}

function relTime(str) {
  if (!str) return '';
  const d = new Date(str);
  if (isNaN(d)) return '';
  const m = Math.floor((Date.now() - d) / 60000);
  const rel = m < 1 ? 'just now' : m < 60 ? m + 'm ago' : m < 1440 ? Math.floor(m/60) + 'h ago' : Math.floor(m/1440) + 'd ago';
  const abs = d.toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit', hour12:true });
  return `<span title="${abs}">${rel}</span><span class="article-abs">${abs}</span>`;
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p.dataset.f === f));
  renderAll();
  renderClusters();
}

async function fetchFeed(src) {
  // Skip sources that need Vercel proxy when it's not yet enabled
  if (src.requiresProxy && !USE_VERCEL_PROXY) {
    store[src.id] = { state: 'error', items: [], proxyRequired: true };
    renderCard(src);
    updateTotalCount();
    updateSourceBtn();
    return;
  }

  store[src.id] = { state: 'loading', items: [] };
  renderCard(src);

  const feedUrls = [src.url, src.fallback].filter(Boolean);

  for (const feedUrl of feedUrls) {
    for (const strategy of PROXY_STRATEGIES) {
      try {
        const { url, parse } = strategy(feedUrl);
        const res = await fetch(url, { signal: AbortSignal.timeout(10000) });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const raw = await parse(res);
        const items = raw.slice(0, 25).filter(i => i.title);
        if (!items.length) throw new Error('empty');
        // Sort newest-first by publish date
        items.sort((a, b) => {
          const da = a.pubDate ? new Date(a.pubDate).getTime() : 0;
          const db = b.pubDate ? new Date(b.pubDate).getTime() : 0;
          return db - da;
        });
        store[src.id] = { state: 'done', items };
        renderCard(src);
        updateTotalCount();
        updateSourceBtn();
        checkBreaking();
        return;
      } catch(e) { /* next strategy */ }
    }
  }

  store[src.id] = { state: 'error', items: [] };
  renderCard(src);
  updateTotalCount();
  updateSourceBtn();
}

function buildArticleHTML(item) {
  const tg = tagItem(item.title, item.desc);
  const tagged = tg.fp || tg.mkt || tg.en || tg.dom || tg.mil || tg.oil;
  const badges = [
    tg.fp  ? `<span class="badge badge-fp">foreign policy</span>`   : '',
    tg.mkt ? `<span class="badge badge-mkt">markets</span>`         : '',
    tg.en  ? `<span class="badge badge-en">energy</span>`           : '',
    tg.dom ? `<span class="badge badge-dom">us politics</span>`      : '',
    tg.mil ? `<span class="badge badge-mil">military</span>`          : '',
    tg.oil ? `<span class="badge badge-oil">upstream / e&p</span>`   : '',
    !tagged ? `<span class="badge badge-other">other</span>`        : '',
  ].join('');
  const safeLink = item.link.replace(/"/g,'&quot;');
  const displayTitle = highlight(item.title, searchQuery);
  const prevLinks = loadPrevLinks();
  const isNew = allFeedsSettled && item.link && !prevLinks.has(item.link);
  const dot = `<div class="article-dot-wrap">${isNew ? '<span class="article-new-dot"></span>' : ''}</div>`;
  return `<a class="article" href="${safeLink}" target="_blank" rel="noopener">
    ${dot}
    <div class="article-body">
      <div class="article-title">${displayTitle}</div>
      <div class="article-meta">
        <span class="article-time">${relTime(item.pubDate)}</span>
        ${badges}
      </div>
    </div>
  </a>`;
}

function renderCard(src) {
  const data = store[src.id] || { state: 'loading', items: [] };
  const card = document.getElementById('card-' + src.id);
  if (!card) return;

  const filtered = data.items.filter(passesFilter);
  const hasActiveFilter = activeFilter !== 'all' || searchQuery;

  // Hide card entirely when loaded but nothing matches
  if (data.state === 'done' && filtered.length === 0 && hasActiveFilter) {
    card.style.display = 'none';
    return;
  }
  // Respect visibility — don't show a hidden source
  if (!isVisible(src.id)) return;
  card.style.display = '';

  let body = '';
  if (data.state === 'loading') {
    body = `<div class="state-msg">Loading…</div>`;
  } else if (data.state === 'error') {
    const msg = data.proxyRequired
      ? `<div class="state-msg error">Requires Vercel proxy.<br><small style="color:var(--text-muted)">Set USE_VERCEL_PROXY = true after deploying.</small></div>`
      : `<div class="state-msg error">
          Could not load feed.<br>
          <a href="${src.site}" target="_blank">Open ${src.name} directly ↗</a>
        </div>`;
    body = msg;
  } else {
    body = filtered.map(buildArticleHTML).join('');
  }

  const wrap = card.querySelector('.articles-wrap');
  if (wrap) wrap.innerHTML = body;

  // Update per-card article count
  const countEl = document.getElementById('count-' + src.id);
  if (countEl) {
    if (data.state === 'done' && filtered.length > 0) {
      countEl.textContent = filtered.length;
    } else {
      countEl.textContent = '';
    }
  }
}

function renderAll() {
  SOURCES.forEach(src => {
    if (!isVisible(src.id)) return;
    renderCard(src);
  });
  updateTotalCount();
}

function updateTotalCount() {
  let total = 0;
  SOURCES.forEach(src => {
    const data = store[src.id];
    if (data?.state === 'done') total += data.items.filter(passesFilter).length;
  });
  const el = document.getElementById('total-count');
  if (el) el.textContent = total > 0 ? total + ' articles' : '';
  // Re-run clustering whenever a feed finishes loading
  const anyDone = SOURCES.some(s => store[s.id]?.state === 'done');
  if (anyDone) renderClusters();
}

// ── Source visibility ──
const VIS_KEY = 'dailyten_visibility';

function loadVisibility() {
  try {
    const saved = JSON.parse(localStorage.getItem(VIS_KEY));
    if (saved && typeof saved === 'object') return saved;
  } catch(e) {}
  // Default: all visible
  const def = {};
  SOURCES.forEach(s => { def[s.id] = true; });
  return def;
}

function saveVisibility(vis) {
  try { localStorage.setItem(VIS_KEY, JSON.stringify(vis)); } catch(e) {}
}

function isVisible(id) {
  return loadVisibility()[id] !== false;
}

function toggleSource(id) {
  const vis = loadVisibility();
  vis[id] = !vis[id];
  saveVisibility(vis);
  const card = document.getElementById('card-' + id);
  if (vis[id] === false) {
    // Hiding — hide the card and update clusters immediately
    if (card) card.style.display = 'none';
    renderClusters();
    const ordered = getOrderedSources();
    if (ordered.length === 0) {
      document.getElementById('trending-section').style.display = 'none';
      showEmptyState();
    }
  } else {
    // Showing — if empty state is displayed, rebuild the full grid first
    if (document.getElementById('empty-state')) {
      buildGrid();
      // Apply visibility to all cards after rebuild
      const allVis = loadVisibility();
      SOURCES.forEach(s => {
        const c = document.getElementById('card-' + s.id);
        if (c && allVis[s.id] === false) c.style.display = 'none';
      });
    }
    const freshCard = document.getElementById('card-' + id);
    if (freshCard) freshCard.style.display = '';
    const src = SOURCES.find(s => s.id === id);
    if (src && (!store[id] || (store[id].state === 'loading' && !store[id].items.length))) {
      fetchFeed(src);
    } else if (src) {
      renderCard(src);
      renderClusters();
    }
  }
  renderPanelList();
  updateSourceBtn();
  // Keep panel open
  const panel = document.getElementById('sources-panel');
  const btn = document.getElementById('manage-btn');
  panel.classList.add('visible');
  btn.classList.add('open');
}

function toggleAllSources() {
  const vis = loadVisibility();
  const anyOff = SOURCES.some(s => vis[s.id] === false);
  SOURCES.forEach(s => { vis[s.id] = anyOff; });
  saveVisibility(vis);
  if (anyOff) {
    // Turning everything on — full reload is simplest and most reliable
    renderPanelList();
    updateSourceBtn();
    // Keep panel open
    const panel = document.getElementById('sources-panel');
    const btn = document.getElementById('manage-btn');
    panel.classList.add('visible');
    btn.classList.add('open');
    loadAll();
  } else {
    // Turning everything off
    SOURCES.forEach(s => {
      const card = document.getElementById('card-' + s.id);
      if (card) card.style.display = 'none';
    });
    document.getElementById('trending-section').style.display = 'none';
    showEmptyState();
    renderPanelList();
    updateSourceBtn();
  }
}

// ── Panel mode ── ('manage' or 'reorder')
let panelMode = 'manage';

const GROUP_LABELS = {
  geopolitical: 'Geopolitical',
  energy:       'Energy & Industry',
  usnews:       'US News & Politics',
  markets:      'Markets',
  alternative:  'Alternative / Independent',
  local:        'Local',
  other:        'Other',
};
const GROUP_ORDER = ['geopolitical','energy','usnews','markets','alternative','local','other'];
const GROUP_SHORT  = {
  geopolitical: 'Geo', energy: 'Energy', usnews: 'US News',
  markets: 'Markets', alternative: 'Alt', local: 'Local', other: 'Other',
};

function setPanelMode(mode) {
  panelMode = mode;
  const manageBtn  = document.getElementById('panel-manage-btn');
  const reorderBtn = document.getElementById('panel-reorder-btn');
  const allBtn     = document.getElementById('panel-all-btn');
  const title      = document.getElementById('panel-title');
  if (mode === 'reorder') {
    manageBtn.classList.remove('active');
    reorderBtn.style.display = 'none';
    let doneBtn = document.getElementById('panel-done-btn');
    if (!doneBtn) {
      doneBtn = document.createElement('button');
      doneBtn.id = 'panel-done-btn';
      doneBtn.className = 'panel-done-btn';
      doneBtn.textContent = 'Done';
      doneBtn.onclick = () => setPanelMode('manage');
      reorderBtn.parentElement.appendChild(doneBtn);
    }
    doneBtn.style.display = '';
    if (allBtn)  allBtn.style.display  = 'none';
    if (title)   title.textContent     = 'Reorder sources';
  } else {
    manageBtn.classList.add('active');
    reorderBtn.style.display = '';
    const doneBtn = document.getElementById('panel-done-btn');
    if (doneBtn) doneBtn.style.display = 'none';
    if (allBtn)  allBtn.style.display  = '';
    if (title)   title.textContent     = 'Visible sources';
  }
  renderPanelList();
  document.getElementById('sources-panel').classList.add('visible');
  document.getElementById('manage-btn').classList.add('open');
}

function toggleGroup(group) {
  const vis = loadVisibility();
  const srcsInGroup = SOURCES.filter(s => (s.group || 'other') === group);
  const anyOn = srcsInGroup.some(s => vis[s.id] !== false);
  srcsInGroup.forEach(s => { vis[s.id] = !anyOn; });
  saveVisibility(vis);
  // Update grid card visibility
  srcsInGroup.forEach(s => {
    const card = document.getElementById('card-' + s.id);
    if (card) card.style.display = vis[s.id] === false ? 'none' : '';
  });
  renderClusters();
  const ordered = getOrderedSources();
  if (ordered.length === 0) {
    document.getElementById('trending-section').style.display = 'none';
    showEmptyState();
  } else if (document.getElementById('empty-state')) {
    buildGrid();
    const allVis = loadVisibility();
    SOURCES.forEach(s => {
      const c = document.getElementById('card-' + s.id);
      if (c && allVis[s.id] === false) c.style.display = 'none';
    });
  }
  renderPanelList();
  updateSourceBtn();
  document.getElementById('sources-panel').classList.add('visible');
  document.getElementById('manage-btn').classList.add('open');
}

function renderPanelList() {
  const vis = loadVisibility();
  const list = document.getElementById('sources-panel-list');
  if (!list) return;
  const order = loadOrder();
  const allOrdered = order.map(id => SOURCES.find(s => s.id === id)).filter(Boolean);

  if (panelMode === 'reorder') {
    let html = '';
    allOrdered.forEach((src, idx) => {
      const isFirst = idx === 0;
      const isLast  = idx === allOrdered.length - 1;
      const tag = GROUP_SHORT[src.group || 'other'] || 'Other';
      html += `<div class="source-row" onclick="event.stopPropagation()">
        <div class="src-order-btns">
          <button class="src-order-btn" ${isFirst ? 'disabled' : ''} onclick="event.stopPropagation();moveSourceGlobal('${src.id}',-1)" title="Move up">▲</button>
          <button class="src-order-btn" ${isLast  ? 'disabled' : ''} onclick="event.stopPropagation();moveSourceGlobal('${src.id}',1)"  title="Move down">▼</button>
        </div>
        <div class="source-row-dot" style="background:${src.color}"></div>
        <span class="source-row-name">${src.name}</span>
        <span class="src-group-tag">${tag}</span>
      </div>`;
    });
    html += `<div class="panel-reorder-hint">Changes apply instantly to the grid</div>`;
    list.innerHTML = html;
    return;
  }

  // Manage mode — grouped with per-group toggle button
  const grouped = {};
  GROUP_ORDER.forEach(g => grouped[g] = []);
  allOrdered.forEach(src => {
    const g = src.group || 'other';
    if (!grouped[g]) grouped[g] = [];
    grouped[g].push(src);
  });

  let html = '';
  GROUP_ORDER.forEach(g => {
    const srcs = grouped[g];
    if (!srcs || srcs.length === 0) return;
    const activeCount = srcs.filter(s => vis[s.id] !== false).length;
    const allOn = activeCount === srcs.length;
    const btnLabel = activeCount === 0 ? 'All off' : allOn ? 'All on' : `${activeCount}/${srcs.length}`;
    html += `<div class="group-header-row">
      <span class="group-header-label">${GROUP_LABELS[g]}</span>
      <button class="group-toggle-btn ${allOn ? 'all-on' : ''}" onclick="event.stopPropagation();toggleGroup('${g}')" title="Toggle all ${GROUP_LABELS[g]} sources">${btnLabel}</button>
    </div>`;
    srcs.forEach(src => {
      const on = vis[src.id] !== false;
      html += `<div class="source-row" onclick="event.stopPropagation();toggleSource('${src.id}')">
        <div class="source-row-dot" style="background:${src.color}"></div>
        <span class="source-row-name">${src.name}</span>
        <button class="src-toggle ${on ? 'on' : ''}" onclick="event.stopPropagation();toggleSource('${src.id}')">
          <span class="src-toggle-knob"></span>
        </button>
      </div>`;
    });
  });
  list.innerHTML = html;
}

function moveSourceGlobal(id, direction) {
  const order = loadOrder();
  const idx = order.indexOf(id);
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= order.length) return;
  [order[idx], order[newIdx]] = [order[newIdx], order[idx]];
  saveOrder(order);
  const grid = document.getElementById('grid');
  const cards = order.map(i => document.getElementById('card-' + i)).filter(Boolean);
  cards.forEach(card => grid.appendChild(card));
  renderPanelList();
  document.getElementById('sources-panel').classList.add('visible');
  document.getElementById('manage-btn').classList.add('open');
}

function updateSourceBtn() {
  const visible = SOURCES.filter(s => isVisible(s.id)).length;
  const total = SOURCES.length;
  const errored = SOURCES.filter(s => isVisible(s.id) && store[s.id]?.state === 'error').length;
  const btn = document.getElementById('manage-btn');
  if (visible === 0) {
    btn.textContent = `⚙ Sources (0/${total})`;
    btn.style.color = '#C0392B';
    btn.style.borderColor = '#C0392B';
  } else if (errored > 0) {
    btn.textContent = `⚙ Sources (${visible}/${total} · ${errored} failed)`;
    btn.style.color = '#B7770D';
    btn.style.borderColor = '#B7770D';
  } else {
    btn.textContent = `⚙ Sources (${visible}/${total})`;
    btn.style.color = '';
    btn.style.borderColor = '';
  }
}

function showEmptyState() {
  const grid = document.getElementById('grid');
  grid.innerHTML = `
    <div id="empty-state" style="grid-column:1/-1;text-align:center;padding:60px 24px;">
      <div style="font-size:32px;margin-bottom:12px;">📭</div>
      <div style="font-size:15px;font-weight:500;color:var(--text-primary);margin-bottom:8px;">No sources visible</div>
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:20px;">All sources are currently hidden. Enable at least one to see headlines.</div>
      <button id="empty-manage-btn" style="font-family:'DM Sans',sans-serif;font-size:13px;color:var(--accent);background:var(--accent-light);border:1px solid var(--accent);border-radius:6px;padding:8px 18px;cursor:pointer;">⚙ Manage Sources</button>
    </div>`;
  document.getElementById('empty-manage-btn').addEventListener('click', e => {
    e.stopPropagation();
    togglePanel();
  });
}

function togglePanel() {
  const panel = document.getElementById('sources-panel');
  const btn = document.getElementById('manage-btn');
  const isOpen = panel.classList.toggle('visible');
  btn.classList.toggle('open', isOpen);
  if (isOpen) {
    renderPanelList();
  } else {
    panelMode = 'manage';
    const manageBtn  = document.getElementById('panel-manage-btn');
    const reorderBtn = document.getElementById('panel-reorder-btn');
    const allBtn     = document.getElementById('panel-all-btn');
    const title      = document.getElementById('panel-title');
    const doneBtn    = document.getElementById('panel-done-btn');
    if (manageBtn)  manageBtn.classList.add('active');
    if (reorderBtn) reorderBtn.style.display = '';
    if (doneBtn)    doneBtn.style.display = 'none';
    if (allBtn)     allBtn.style.display = '';
    if (title)      title.textContent = 'Visible sources';
  }
}

// Close panel when clicking outside
document.addEventListener('click', e => {
  const panel = document.getElementById('sources-panel');
  const btn = document.getElementById('manage-btn');
  if (!panel.classList.contains('visible')) return;
  if (!panel.contains(e.target) && !btn.contains(e.target)) {
    panel.classList.remove('visible');
    btn.classList.remove('open');

});

// ── Layout toggle ──
const LAYOUT_KEY = 'dailyten_layout';
// ── Trending collapse ──
const TRENDING_KEY = 'upstream_trending_collapsed';
const TRENDING_SEEN_COUNT_KEY = 'upstream_trending_seen_count';

function getTrendingSeenCount() {
  try { return parseInt(localStorage.getItem(TRENDING_SEEN_COUNT_KEY)) || 0; } catch(e) { return 0; }
}
function saveTrendingSeenCount(n) {
  try { localStorage.setItem(TRENDING_SEEN_COUNT_KEY, String(n)); } catch(e) {}
}
function updateTrendingNewDot(clusterCount) {
  const btn = document.getElementById('trending-collapse-btn');
  if (!btn) return;
  let dot = document.getElementById('trending-new-dot');
  if (!dot) {
    dot = document.createElement('span');
    dot.id = 'trending-new-dot';
    dot.className = 'trending-new-dot';
    btn.appendChild(dot);
  }
  const section = document.getElementById('trending-section');
  const isCollapsed = section?.classList.contains('collapsed');
  const seenCount = getTrendingSeenCount();
  if (isCollapsed && clusterCount > seenCount) {
    dot.classList.add('visible');
  } else {
    dot.classList.remove('visible');
  }
}

function toggleTrending() {
  const body = document.getElementById('trending-body');
  const btn = document.getElementById('trending-collapse-btn');
  const section = document.getElementById('trending-section');
  const isCollapsed = body.style.display === 'none';
  body.style.display = isCollapsed ? '' : 'none';
  btn.textContent = isCollapsed ? '▲ collapse' : '▼ expand';
  section.classList.toggle('collapsed', !isCollapsed);
  section.style.paddingBottom = isCollapsed ? '' : '16px';
  try { localStorage.setItem(TRENDING_KEY, isCollapsed ? '0' : '1'); } catch(e) {}
  // When expanding, save current cluster count as seen and clear the dot
  if (isCollapsed) {
    const clusters = document.getElementById('clusters');
    const count = clusters ? clusters.querySelectorAll('.cluster-card').length : 0;
    saveTrendingSeenCount(count);
    const dot = document.getElementById('trending-new-dot');
    if (dot) dot.classList.remove('visible');
  }
}

function setLayout(mode) {
