<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Upstream Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --border: #E2DDD6;
    --border-light: #EDE9E3;
    --text-primary: #1A1916;
    --text-secondary: #6B6760;
    --text-muted: #A39F99;
    --accent: #2C4A7C;
    --accent-light: #E8EDF5;
    --tag-fp: #7C4A2C;
    --tag-fp-bg: #F5EDE8;
    --tag-mkt: #2C6B3A;
    --tag-mkt-bg: #E8F5EC;
    --tag-en: #6B5A2C;
    --tag-en-bg: #F5F0E8;
    --tag-dom: #2C4A6B;
    --tag-dom-bg: #E8EDF5;
    --tag-other: #555250;
    --tag-other-bg: #EDEAE6;
    --tag-mil: #5C2C2C;
    --tag-mil-bg: #F5E8E8;
    --tag-oil: #2C4A2C;
    --tag-oil-bg: #E8F0E8;
    --zh: #C0392B;
    --rt: #2563A8;
    --gw: #1A7A52;
    --gg: #A0621A;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 0;
  }

  /* ── Masthead ── */
  .masthead {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px 16px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .masthead-left { display: flex; flex-direction: column; gap: 4px; }
  .masthead-title {
    font-family: 'Spectral', serif;
    font-size: 26px;
    font-weight: 500;
    letter-spacing: -0.3px;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .masthead-tag {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--accent);
    color: #fff;
    padding: 3px 8px;
    border-radius: 4px;
    vertical-align: middle;
  }
  .masthead-date {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .masthead-right { display: flex; align-items: center; gap: 10px; }
  .refresh-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--text-secondary);
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .refresh-btn:hover { background: var(--bg); border-color: var(--text-muted); }
  .refresh-btn.spinning { opacity: 0.5; pointer-events: none; }
  .last-refreshed {
    font-size: 11px; color: var(--text-muted);
    white-space: nowrap;
  }

  /* ── Filter bar ── */
  .filter-bar {
    padding: 12px 32px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border-light);
    background: var(--surface);
    flex-wrap: wrap;
  }
  .filter-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-right: 4px; }
  .pill {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-secondary);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .pill:hover { border-color: var(--text-muted); color: var(--text-primary); }
  .pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .pill.dimmed { opacity: 0.4; pointer-events: none; }
  .article-count { font-size: 11px; color: var(--text-muted); margin-left: auto; }

  /* ── Search input ── */
  .search-wrap { position: relative; display: flex; align-items: center; margin-left: 8px; }
  .search-icon { position: absolute; left: 9px; width: 13px; height: 13px; pointer-events: none; color: var(--text-muted); }
  .search-input {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--text-primary);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 4px 12px 4px 28px;
    width: 160px;
    outline: none;
    transition: border-color 0.15s, width 0.2s;
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus { border-color: var(--accent); width: 210px; }
  .search-clear {
    position: absolute; right: 8px; background: none; border: none;
    cursor: pointer; font-size: 14px; color: var(--text-muted); line-height: 1;
    display: none; padding: 0;
  }
  .search-clear.visible { display: block; }
  .search-active .search-input { border-color: var(--accent); background: var(--accent-light); }
  mark { background: #FFF176; color: inherit; border-radius: 2px; padding: 0 1px; }

  /* ── Main grid ── */
  .main { padding: 24px 32px 48px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }
  .grid.comfortable {
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  /* ── Layout toggle ── */
  .layout-toggle {
    display: flex; align-items: center;
    border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
  }
  .lt-btn {
    background: none; border: none; cursor: pointer;
    padding: 5px 9px; color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .lt-btn:first-child { border-right: 1px solid var(--border); }
  .lt-btn:hover { background: var(--bg); color: var(--text-secondary); }
  .lt-btn.active { background: var(--accent-light); color: var(--accent); }

  /* ── Drag and drop ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: box-shadow 0.15s, opacity 0.15s, transform 0.15s;
    cursor: default;
  }
  .card.dragging { opacity: 0.4; transform: scale(0.98); }
  .card.drag-over { box-shadow: 0 0 0 2px var(--accent); }
  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-light);
    cursor: grab;
    user-select: none;
  }
  .card-header:active { cursor: grabbing; }
  .drag-handle {
    display: flex; flex-direction: column; gap: 2px;
    margin-right: 2px; opacity: 0.3; flex-shrink: 0;
  }
  .drag-handle span {
    display: block; width: 14px; height: 1.5px;
    background: var(--text-primary); border-radius: 1px;
  }
  /* ── Bias badge ── */
  .bias-badge {
    font-size: 9px; font-weight: 500;
    padding: 2px 7px; border-radius: 99px;
    letter-spacing: 0.03em;
    cursor: pointer; white-space: nowrap;
    border: 1px solid transparent;
    transition: opacity 0.15s;
    margin-left: auto;
  }
  .bias-badge:hover { opacity: 0.75; }
  .bias-edit-wrap { position: relative; margin-left: auto; }
  .bias-input {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; padding: 2px 7px;
    border: 1px solid var(--border); border-radius: 99px;
    background: var(--bg); color: var(--text-primary);
    outline: none; width: 130px;
  }
  .bias-input:focus { border-color: var(--accent); }

  .source-bar { width: 3px; height: 18px; border-radius: 2px; flex-shrink: 0; }
  .card-title { font-size: 13px; font-weight: 500; color: var(--text-primary); }
  .card-count { font-size: 11px; color: var(--text-muted); margin-left: auto; }
  .visit-link { font-size: 11px; color: var(--accent); text-decoration: none; margin-left: 6px; }
  .visit-link:hover { text-decoration: underline; }

  /* ── Articles ── */
  .articles { flex: 1; }
  .article {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border-light);
    cursor: pointer;
    transition: background 0.1s;
    text-decoration: none;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    color: inherit;
  }
  .article:last-child { border-bottom: none; }
  .article:hover { background: var(--bg); }
  .article-dot-wrap { padding-top: 3px; width: 8px; flex-shrink: 0; }
  .article-new-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--gw);
    display: block;
  }
  .article-body { flex: 1; min-width: 0; }
  .article-title {
    font-size: 13px;
    line-height: 1.45;
    color: var(--text-primary);
    margin-bottom: 4px;
    font-weight: 400;
  }
  .article-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .article-time { font-size: 11px; color: var(--text-muted); }
  .article-abs  { font-size: 11px; color: var(--text-muted); margin-left: 4px; opacity: 0.7; }
  .badge {
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 99px;
    font-weight: 400;
  }
  .badge-fp  { background: var(--tag-fp-bg);    color: var(--tag-fp); }
  .badge-mkt { background: var(--tag-mkt-bg);   color: var(--tag-mkt); }
  .badge-en  { background: var(--tag-en-bg);    color: var(--tag-en); }
  .badge-dom { background: var(--tag-dom-bg);   color: var(--tag-dom); }
  .badge-other { background: var(--tag-other-bg); color: var(--tag-other); }
  .badge-mil { background: var(--tag-mil-bg);   color: var(--tag-mil); }
  .badge-oil { background: var(--tag-oil-bg);   color: var(--tag-oil); }

  /* ── States ── */
  .state-msg {
    padding: 28px 16px;
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.6;
  }
  .state-msg a { color: var(--accent); }
  .state-msg.error { color: #C0392B; }

  /* ── Scrollable card body ── */
  .articles-wrap { max-height: 276px; overflow-y: auto; }
  .articles-wrap::-webkit-scrollbar { width: 4px; }
  .articles-wrap::-webkit-scrollbar-track { background: transparent; }
  .articles-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (max-width: 600px) {
    .masthead, .filter-bar, .main { padding-left: 16px; padding-right: 16px; }
    .masthead-title { font-size: 20px; }
  }

  /* ── Breaking news bar ── */
  .breaking-bar {
    display: none;
    background: #C0392B;
    color: #fff;
    padding: 9px 32px;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    position: relative;
    z-index: 90;
    animation: breakingPulse 2s ease-in-out 3;
  }
  .breaking-bar.visible { display: flex; }
  @keyframes breakingPulse {
    0%, 100% { background: #C0392B; }
    50% { background: #E74C3C; }
  }
  .breaking-label {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    background: rgba(255,255,255,0.2);
    padding: 2px 8px; border-radius: 3px;
    white-space: nowrap; flex-shrink: 0;
  }
  .breaking-text {
    flex: 1; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
    font-weight: 400;
  }
  .breaking-link {
    color: #fff; text-decoration: none;
    flex: 1; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .breaking-link:hover { text-decoration: underline; }
  .breaking-source {
    font-size: 11px; opacity: 0.75;
    white-space: nowrap; flex-shrink: 0;
  }
  .breaking-dismiss {
    background: none; border: none; color: #fff;
    font-size: 16px; cursor: pointer; opacity: 0.7;
    padding: 0 0 0 8px; flex-shrink: 0; line-height: 1;
  }
  .breaking-dismiss:hover { opacity: 1; }
  .breaking-more {
    background: rgba(255,255,255,0.2); border: none; color: #fff;
    font-size: 11px; font-weight: 600; cursor: pointer;
    padding: 2px 8px; border-radius: 3px; white-space: nowrap;
    flex-shrink: 0; transition: background 0.15s;
  }
  .breaking-more:hover { background: rgba(255,255,255,0.35); }
  .breaking-dropdown {
    display: none;
    position: fixed; left: 0; right: 0;
    background: #922B21; border-top: 1px solid rgba(255,255,255,0.15);
    z-index: 999; max-height: 320px; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .breaking-dropdown.open { display: block; }
  .breaking-drop-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 9px 32px; border-bottom: 1px solid rgba(255,255,255,0.1);
    text-decoration: none; color: #fff; transition: background 0.1s;
  }
  .breaking-drop-item:hover { background: rgba(255,255,255,0.1); }
  .breaking-drop-item:last-child { border-bottom: none; }
  .breaking-drop-title { font-size: 12px; flex: 1; line-height: 1.4; }
  .breaking-drop-meta { font-size: 11px; opacity: 0.65; white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
  @media (max-width: 600px) {
    .breaking-bar { padding: 9px 16px; }
    .breaking-drop-item { padding: 9px 16px; }
  }

  /* ── Trending section ── */
  .trending-section {
    padding: 20px 32px 4px;
    border-bottom: 1px solid var(--border-light);
  }
  .trending-header {
    display: flex; align-items: baseline; gap: 12px; margin-bottom: 14px;
    cursor: pointer; user-select: none;
  }
  .trending-header:hover .trending-title { opacity: 0.75; }
  .trending-collapse-btn {
    margin-left: auto; font-size: 11px; color: var(--text-muted);
    background: none; border: none; cursor: pointer; padding: 0;
    font-family: 'DM Sans', sans-serif; flex-shrink: 0;
  }
  .trending-collapsed-badge {
    display: none;
    font-size: 10px; font-weight: 500;
    background: var(--accent-light); color: var(--accent);
    padding: 2px 8px; border-radius: 99px;
    white-space: nowrap;
  }
  .trending-section.collapsed .trending-collapsed-badge { display: inline; }
  .trending-section.collapsed .trending-sub { display: none; }
  .trending-title {
    font-family: 'Spectral', serif;
    font-size: 15px; font-weight: 500; color: var(--text-primary);
    text-transform: uppercase; letter-spacing: 0.06em; font-size: 11px;
  }
  .trending-sub { font-size: 11px; color: var(--text-muted); }
  .clusters {
    display: flex; gap: 14px; overflow-x: auto; padding-bottom: 16px;
    scrollbar-width: thin;
  }
  .clusters::-webkit-scrollbar { height: 3px; }
  .clusters::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .cluster-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
    min-width: 260px; max-width: 300px; flex-shrink: 0;
    border-top: 3px solid var(--accent);
  }
  .cluster-topic {
    font-size: 13px; font-weight: 500; color: var(--text-primary);
    margin-bottom: 4px; line-height: 1.3;
  }
  .cluster-meta {
    font-size: 11px; color: var(--text-muted); margin-bottom: 10px;
    display: flex; gap: 8px; align-items: center;
  }
  .cluster-source-count {
    background: var(--accent-light); color: var(--accent);
    font-size: 10px; font-weight: 500;
    padding: 1px 7px; border-radius: 99px;
  }
  .cluster-headlines { display: flex; flex-direction: column; gap: 6px; }
  .cluster-headline {
    display: flex; gap: 7px; align-items: flex-start;
    text-decoration: none; color: inherit;
    padding: 5px 7px; border-radius: 6px; margin: 0 -7px;
    transition: background 0.1s;
  }
  .cluster-headline:hover { background: var(--bg); }
  .cluster-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .cluster-hl-text { font-size: 12px; color: var(--text-secondary); line-height: 1.4; }
  .cluster-hl-source { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

  /* ── Cluster bias enhancements ── */
  .cluster-spectrum {
    display: flex; gap: 3px; align-items: center;
    margin-bottom: 10px; height: 5px; border-radius: 99px; overflow: hidden;
  }
  .cluster-spectrum-seg {
    height: 100%; border-radius: 99px; flex-shrink: 0;
  }
  .cluster-coverage {
    font-size: 10px; color: var(--text-muted);
    margin-bottom: 8px; letter-spacing: 0.03em;
    display: flex; align-items: center; gap: 5px; flex-wrap: wrap;
  }
  .cluster-coverage-pip {
    display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; flex-shrink: 0;
  }
  .cluster-hl-bias {
    font-size: 9px; color: var(--text-muted);
    opacity: 0.75; margin-left: 3px; white-space: nowrap;
  }
  .cluster-more-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; color: var(--accent);
    background: var(--accent-light); border: none;
    border-radius: 99px; padding: 3px 10px;
    cursor: pointer; margin-top: 6px;
    transition: background 0.15s;
  }
  .cluster-more-btn:hover { background: #d8e4f5; }


  /* ── Manage sources panel ── */
  .manage-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; color: var(--text-secondary);
    background: none; border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 14px;
    cursor: pointer; transition: all 0.15s;
  }
  .manage-btn:hover { background: var(--bg); border-color: var(--text-muted); }
  .manage-btn.open { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
  .masthead { position: relative; }
  .sources-panel {
    display: none;
    position: absolute; top: calc(100% + 4px); right: 32px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    z-index: 200; min-width: 280px;
    padding: 12px 0;
  }
  .sources-panel.visible { display: block; }
  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 16px 10px; border-bottom: 1px solid var(--border-light);
    margin-bottom: 4px;
  }
  .panel-title { font-size: 11px; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.06em; }
  .panel-all-btn { font-size: 11px; color: var(--accent); background: none; border: none; cursor: pointer; padding: 0; }
  .panel-all-btn:hover { text-decoration: underline; }
  .source-row {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 16px; cursor: pointer; transition: background 0.1s;
  }
  .source-row:hover { background: var(--bg); }
  .src-order-btns { display: flex; flex-direction: column; gap: 1px; margin-right: 4px; }
  .src-order-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); font-size: 10px; line-height: 1;
    padding: 1px 3px; border-radius: 3px; transition: color 0.1s, background 0.1s;
  }
  .src-order-btn:hover:not(:disabled) { color: var(--accent); background: var(--accent-light); }
  .src-order-btn:disabled { opacity: 0.2; cursor: default; }
  .source-row-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .source-row-name { font-size: 13px; color: var(--text-primary); flex: 1; }
  .src-toggle {
    position: relative; width: 28px; height: 16px;
    background: var(--border); border: none; border-radius: 99px;
    cursor: pointer; padding: 0; flex-shrink: 0; transition: background 0.2s;
  }
  .src-toggle.on { background: var(--accent); }
  .src-toggle-knob {
    position: absolute; top: 2px; left: 2px;
    width: 12px; height: 12px; border-radius: 50%;
    background: #fff; transition: transform 0.2s; display: block;
  }
  .src-toggle.on .src-toggle-knob { transform: translateX(12px); }

  /* ── Weather widget ── */
  .weather-widget {
    display: flex; align-items: center; gap: 10px;
    font-size: 12px; color: var(--text-secondary);
    white-space: nowrap; margin-left: auto;
    padding-left: 16px;
    border-left: 1px solid var(--border-light);
  }
  .weather-temp {
    font-size: 16px; font-weight: 500;
    color: var(--text-primary); line-height: 1;
  }
  .weather-icon { font-size: 16px; line-height: 1; }
  .weather-detail { display: flex; flex-direction: column; gap: 1px; }
  .weather-hi-lo { font-size: 11px; color: var(--text-muted); }
  .weather-precip { font-size: 11px; color: var(--accent); }
  @media (max-width: 600px) { .weather-widget { display: none; } }

  /* ── Weather location popover ── */
  .weather-widget { cursor: pointer; position: relative; }
  .weather-widget:hover .weather-temp { text-decoration: underline dotted; }
  .weather-popover {
    display: none; position: absolute;
    top: calc(100% + 10px); right: 0;
    background: var(--surface); border: 1px solid var(--border);

// ── Breaking news seen/new tracking ──

// Two independent localStorage buckets control what surfaces in the breaking bar:
//
//   SEEN_KEY  — articles the user explicitly dismissed via "✓ Seen".
//               Stored as { url: timestamp } so entries auto-expire after 48 hours,
//               preventing permanent suppression of articles that reappear or share a URL.
//
//   PREV_KEY  — snapshot of every article link present at the END of the last full
//               refresh cycle. On the next refresh, any link already in this set is
//               treated as "not new" and filtered out of breaking candidates.
//               Written once in batch (in loadAll) after ALL feeds settle — never
//               per-feed — so sibling feeds loading in parallel can't poison each
//               other's novelty check during the same refresh cycle.

const SEEN_KEY = 'upstream_seen_links';
const PREV_KEY = 'upstream_prev_links';

function loadSeenLinks() {
  try {
    const raw = JSON.parse(localStorage.getItem(SEEN_KEY));
    if (!raw) return new Set();
    const cutoff = Date.now() - 48 * 60 * 60 * 1000; // 48-hour TTL

    // One-time migration: old format was a plain string[], new format is {link: timestamp}.
    // Stamp migrated entries with now so they survive this session before expiring normally.
    if (Array.isArray(raw)) {
      const migrated = {};
      raw.forEach(link => { migrated[link] = Date.now(); });
      localStorage.setItem(SEEN_KEY, JSON.stringify(migrated));
      return new Set(raw);
    }

    // Prune expired entries on every load and re-persist the trimmed set
    const fresh = {};
    Object.entries(raw).forEach(([link, ts]) => { if (ts > cutoff) fresh[link] = ts; });
    localStorage.setItem(SEEN_KEY, JSON.stringify(fresh));
    return new Set(Object.keys(fresh));
  } catch(e) { return new Set(); }
}

function saveSeenLinks(s) {
  // Merge into existing store so we don't overwrite timestamps for links already recorded
  try {
    let existing = {};
    try { const r = JSON.parse(localStorage.getItem(SEEN_KEY)); if (r && !Array.isArray(r)) existing = r; } catch(e) {}
    const now = Date.now();
    s.forEach(link => { if (!existing[link]) existing[link] = now; });
    localStorage.setItem(SEEN_KEY, JSON.stringify(existing));
  } catch(e) {}
}

// prevLinks is a plain Set<string> — no TTL needed because it's cleared and
// rewritten from scratch on every refresh (see loadAll).
function loadPrevLinks() {
  try { return new Set(JSON.parse(localStorage.getItem(PREV_KEY)) || []); } catch(e) { return new Set(); }
}
function savePrevLinks(s) {
  try { localStorage.setItem(PREV_KEY, JSON.stringify([...s])); } catch(e) {}
}
// Three independent proxy strategies tried in order per feed
const PROXY_STRATEGIES = [
  // 1. rss2json — clean URL only, no extra params (unknown params break free tier)
  feedUrl => ({
    url: `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}`,
    parse: async res => {
      const j = await res.json();
      if (j.status !== 'ok' || !j.items?.length) throw new Error('empty');
      return j.items.map(i => ({
        title: i.title || '',
        link: i.link || i.url || '',
        pubDate: i.pubDate || i.published || i.date || i.updated || '',
        desc: (i.description || i.content || '').replace(/<[^>]+>/g, ''),
      }));
    }
  }),
  // 2. corsproxy.io — raw XML fetch
  feedUrl => ({
    url: `https://corsproxy.io/?${encodeURIComponent(feedUrl)}`,
    parse: async res => parseXML(await res.text())
  }),
  // 3. allorigins — raw XML fetch
  feedUrl => ({
    url: `https://api.allorigins.win/raw?url=${encodeURIComponent(feedUrl)}`,
    parse: async res => parseXML(await res.text())
  }),
];

function parseXML(text) {
  const doc = new DOMParser().parseFromString(text, 'text/xml');
  const items = [...doc.querySelectorAll('item')];
  if (!items.length) throw new Error('no items');
  return items.map(el => {
    const get = tag => el.querySelector(tag)?.textContent?.trim() || '';
    return {
      title: get('title'),
      link: get('link') || el.querySelector('link')?.getAttribute('href') || '',
      pubDate: get('pubDate') || get('published') || get('dc\:date') || get('updated') || get('date'),
      desc: get('description').replace(/<[^>]+>/g, ''),
    };
  }).filter(i => i.title);
}

    en:  EN_KW.some(k  => t.includes(k)),
    dom: DOM_KW.some(k => t.includes(k)),
    mil: MIL_KW.some(k => t.includes(k)),
    oil: UPSTREAM_KW.some(k => t.includes(k)),
  };
}

function passesFilter(item) {
  const tg = tagItem(item.title, item.desc);
  const text = (item.title + ' ' + (item.desc||'')).toLowerCase();

  // Whole word matching — "war" matches "war" but not "warns" or "award"
  const escaped = searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const wordMatch = new RegExp(`\\b${escaped}`, 'i');
  const matchesSearch = !searchQuery || wordMatch.test(item.title + ' ' + (item.desc||''));
  const matchesPill =
    activeFilter === 'all'      ? true :
    activeFilter === 'fp'       ? tg.fp  :
    activeFilter === 'markets'  ? tg.mkt :
    activeFilter === 'energy'   ? tg.en  :
    activeFilter === 'domestic' ? tg.dom :
    activeFilter === 'military' ? tg.mil :
    activeFilter === 'oil'      ? tg.oil : true;

  return matchesSearch && matchesPill;
}

function highlight(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(\\b${escaped})`, 'gi'), '<mark>$1</mark>');
}

function onSearch(val) {
  searchQuery = val.trim().toLowerCase();
  const clearBtn = document.getElementById('search-clear');
  const wrap = document.getElementById('search-wrap');
  clearBtn.classList.toggle('visible', searchQuery.length > 0);
  wrap.classList.toggle('search-active', searchQuery.length > 0);
  renderAll();
  renderClusters();
}

function clearSearch() {
  searchQuery = '';
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').classList.remove('visible');
  document.getElementById('search-wrap').classList.remove('search-active');
  renderAll();
  renderClusters();
}

function relTime(str) {
  if (!str) return '';
  const d = new Date(str);
  if (isNaN(d)) return '';
  const m = Math.floor((Date.now() - d) / 60000);
  const rel = m < 1 ? 'just now' : m < 60 ? m + 'm ago' : m < 1440 ? Math.floor(m/60) + 'h ago' : Math.floor(m/1440) + 'd ago';
  const abs = d.toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit', hour12:true });
  return `<span title="${abs}">${rel}</span><span class="article-abs">${abs}</span>`;
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p.dataset.f === f));
  renderAll();
  renderClusters();
}

async function fetchFeed(src) {
  store[src.id] = { state: 'loading', items: [] };
  renderCard(src);

  const feedUrls = [src.url, src.fallback].filter(Boolean);

  for (const feedUrl of feedUrls) {
    for (const strategy of PROXY_STRATEGIES) {
      try {
        const { url, parse } = strategy(feedUrl);
        const res = await fetch(url, { signal: AbortSignal.timeout(10000) });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const raw = await parse(res);
        const items = raw.slice(0, 25).filter(i => i.title);
        if (!items.length) throw new Error('empty');
        // Sort newest-first by publish date
        items.sort((a, b) => {
          const da = a.pubDate ? new Date(a.pubDate).getTime() : 0;
          const db = b.pubDate ? new Date(b.pubDate).getTime() : 0;
          return db - da;
        });
        store[src.id] = { state: 'done', items };
        renderCard(src);
        updateTotalCount();
        updateSourceBtn();
        checkBreaking();
        return;
      } catch(e) { /* next strategy */ }
    }
  }

  store[src.id] = { state: 'error', items: [] };
  renderCard(src);
  updateTotalCount();
  updateSourceBtn();
}

function buildArticleHTML(item) {
  const tg = tagItem(item.title, item.desc);
  const tagged = tg.fp || tg.mkt || tg.en || tg.dom || tg.mil || tg.oil;
  const badges = [
    tg.fp  ? `<span class="badge badge-fp">foreign policy</span>`   : '',
    tg.mkt ? `<span class="badge badge-mkt">markets</span>`         : '',
    tg.en  ? `<span class="badge badge-en">energy</span>`           : '',
    tg.dom ? `<span class="badge badge-dom">us politics</span>`      : '',
    tg.mil ? `<span class="badge badge-mil">military</span>`          : '',
    tg.oil ? `<span class="badge badge-oil">upstream / e&p</span>`   : '',
    !tagged ? `<span class="badge badge-other">other</span>`        : '',
  ].join('');
  const safeLink = item.link.replace(/"/g,'&quot;');
  const displayTitle = highlight(item.title, searchQuery);
  const prevLinks = loadPrevLinks();
  const isNew = allFeedsSettled && item.link && !prevLinks.has(item.link);
  const dot = `<div class="article-dot-wrap">${isNew ? '<span class="article-new-dot"></span>' : ''}</div>`;
  return `<a class="article" href="${safeLink}" target="_blank" rel="noopener">
    ${dot}
    <div class="article-body">
      <div class="article-title">${displayTitle}</div>
      <div class="article-meta">
        <span class="article-time">${relTime(item.pubDate)}</span>
        ${badges}
      </div>
    </div>
  </a>`;
}

function renderCard(src) {
  const data = store[src.id] || { state: 'loading', items: [] };
  const card = document.getElementById('card-' + src.id);
  if (!card) return;

  const filtered = data.items.filter(passesFilter);
  const hasActiveFilter = activeFilter !== 'all' || searchQuery;

  // Hide card entirely when loaded but nothing matches
  if (data.state === 'done' && filtered.length === 0 && hasActiveFilter) {
    card.style.display = 'none';
    return;
  }
  // Respect visibility — don't show a hidden source
  if (!isVisible(src.id)) return;
  card.style.display = '';

  let body = '';
  if (data.state === 'loading') {
    body = `<div class="state-msg">Loading…</div>`;
  } else if (data.state === 'error') {
    body = `<div class="state-msg error">
      Could not load feed.<br>
      <a href="${src.site}" target="_blank">Open ${src.name} directly ↗</a>
    </div>`;
  } else {
    body = filtered.map(buildArticleHTML).join('');
  }

  const wrap = card.querySelector('.articles-wrap');
  if (wrap) wrap.innerHTML = body;
}

function renderAll() {
  SOURCES.forEach(src => {
    if (!isVisible(src.id)) return;
    renderCard(src);
  });
  updateTotalCount();
}

function updateTotalCount() {
  let total = 0;
  SOURCES.forEach(src => {
    const data = store[src.id];
    if (data?.state === 'done') total += data.items.filter(passesFilter).length;
  });
  const el = document.getElementById('total-count');
  if (el) el.textContent = total > 0 ? total + ' articles' : '';
  // Re-run clustering whenever a feed finishes loading
  const anyDone = SOURCES.some(s => store[s.id]?.state === 'done');
  if (anyDone) renderClusters();
}

// ── Source visibility ──
const VIS_KEY = 'dailyten_visibility';

function loadVisibility() {
  try {
    const saved = JSON.parse(localStorage.getItem(VIS_KEY));
    if (saved && typeof saved === 'object') return saved;
  } catch(e) {}
  // Default: all visible
  const def = {};
  SOURCES.forEach(s => { def[s.id] = true; });
  return def;
}

function saveVisibility(vis) {
  try { localStorage.setItem(VIS_KEY, JSON.stringify(vis)); } catch(e) {}
}

function isVisible(id) {
  return loadVisibility()[id] !== false;
}

function toggleSource(id) {
  const vis = loadVisibility();
  vis[id] = !vis[id];
  saveVisibility(vis);
  const card = document.getElementById('card-' + id);
  if (vis[id] === false) {
    // Hiding — hide the card and update clusters immediately
    if (card) card.style.display = 'none';
    renderClusters();
    const ordered = getOrderedSources();
    if (ordered.length === 0) {
      document.getElementById('trending-section').style.display = 'none';
      showEmptyState();
    }
  } else {
    // Showing — if empty state is displayed, rebuild the full grid first
    if (document.getElementById('empty-state')) {
      buildGrid();
      // Apply visibility to all cards after rebuild
      const allVis = loadVisibility();
      SOURCES.forEach(s => {
        const c = document.getElementById('card-' + s.id);
        if (c && allVis[s.id] === false) c.style.display = 'none';
      });
    }
    const freshCard = document.getElementById('card-' + id);
    if (freshCard) freshCard.style.display = '';
    const src = SOURCES.find(s => s.id === id);
    if (src && (!store[id] || (store[id].state === 'loading' && !store[id].items.length))) {
      fetchFeed(src);
    } else if (src) {
      renderCard(src);
      renderClusters();
    }
  }
  renderPanelList();
  updateSourceBtn();
  // Keep panel open
  const panel = document.getElementById('sources-panel');
  const btn = document.getElementById('manage-btn');
  panel.classList.add('visible');
  btn.classList.add('open');
}

function toggleAllSources() {
  const vis = loadVisibility();
  const anyOff = SOURCES.some(s => vis[s.id] === false);
  SOURCES.forEach(s => { vis[s.id] = anyOff; });
  saveVisibility(vis);
  if (anyOff) {
    // Turning everything on — full reload is simplest and most reliable
    renderPanelList();
    updateSourceBtn();
    // Keep panel open
    const panel = document.getElementById('sources-panel');
    const btn = document.getElementById('manage-btn');
    panel.classList.add('visible');
    btn.classList.add('open');
    loadAll();
  } else {
    // Turning everything off
    SOURCES.forEach(s => {
      const card = document.getElementById('card-' + s.id);
      if (card) card.style.display = 'none';
    });
    document.getElementById('trending-section').style.display = 'none';
    showEmptyState();
    renderPanelList();
    updateSourceBtn();
  }
}

function renderPanelList() {
  const vis = loadVisibility();
  const list = document.getElementById('sources-panel-list');
  if (!list) return;
  const order = loadOrder();
  const allOrdered = order.map(id => SOURCES.find(s => s.id === id)).filter(Boolean);
  const last = allOrdered.length - 1;
  list.innerHTML = allOrdered.map((src, idx) => {
    const on = vis[src.id] !== false;
    return `<div class="source-row" onclick="event.stopPropagation();toggleSource('${src.id}')">
      <div class="src-order-btns">
        <button class="src-order-btn" ${idx === 0 ? 'disabled' : ''} onclick="event.stopPropagation();moveSource('${src.id}',-1)" title="Move up">▲</button>
        <button class="src-order-btn" ${idx === last ? 'disabled' : ''} onclick="event.stopPropagation();moveSource('${src.id}',1)" title="Move down">▼</button>
      </div>
      <div class="source-row-dot" style="background:${src.color}"></div>
      <span class="source-row-name">${src.name}</span>
      <button class="src-toggle ${on ? 'on' : ''}" onclick="event.stopPropagation();toggleSource('${src.id}')">
        <span class="src-toggle-knob"></span>
      </button>
    </div>`;
  }).join('');
}

function moveSource(id, direction) {
  const order = loadOrder();
  const idx = order.indexOf(id);
  if (idx < 0) return;
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= order.length) return;
  // Swap
  [order[idx], order[newIdx]] = [order[newIdx], order[idx]];
  saveOrder(order);
  // Reorder cards in the grid DOM
  const grid = document.getElementById('grid');
  const cards = order.map(i => document.getElementById('card-' + i)).filter(Boolean);
  cards.forEach(card => grid.appendChild(card));
  renderPanelList();
  // Keep panel open
  const panel = document.getElementById('sources-panel');
  const btn = document.getElementById('manage-btn');
  panel.classList.add('visible');
  btn.classList.add('open');
}

function updateSourceBtn() {
  const visible = SOURCES.filter(s => isVisible(s.id)).length;
  const total = SOURCES.length;
  const errored = SOURCES.filter(s => isVisible(s.id) && store[s.id]?.state === 'error').length;
  const btn = document.getElementById('manage-btn');
  if (visible === 0) {
    btn.textContent = `⚙ Sources (0/${total})`;
    btn.style.color = '#C0392B';
    btn.style.borderColor = '#C0392B';
  } else if (errored > 0) {
    btn.textContent = `⚙ Sources (${visible}/${total} · ${errored} failed)`;
    btn.style.color = '#B7770D';
    btn.style.borderColor = '#B7770D';
  } else {
    btn.textContent = `⚙ Sources (${visible}/${total})`;
    btn.style.color = '';
    btn.style.borderColor = '';
  }
}

function showEmptyState() {
  const grid = document.getElementById('grid');
  grid.innerHTML = `
    <div id="empty-state" style="grid-column:1/-1;text-align:center;padding:60px 24px;">
      <div style="font-size:32px;margin-bottom:12px;">📭</div>
      <div style="font-size:15px;font-weight:500;color:var(--text-primary);margin-bottom:8px;">No sources visible</div>
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:20px;">All sources are currently hidden. Enable at least one to see headlines.</div>
      <button id="empty-manage-btn" style="font-family:'DM Sans',sans-serif;font-size:13px;color:var(--accent);background:var(--accent-light);border:1px solid var(--accent);border-radius:6px;padding:8px 18px;cursor:pointer;">⚙ Manage Sources</button>
    </div>`;
  document.getElementById('empty-manage-btn').addEventListener('click', e => {
    e.stopPropagation();

}

function togglePanel() {
  const panel = document.getElementById('sources-panel');
  const btn = document.getElementById('manage-btn');

const LAYOUT_KEY = 'dailyten_layout';
// ── Trending collapse ──

function toggleTrending() {

  section.style.paddingBottom = isCollapsed ? '' : '16px';

function initTrending() {

      const btn = document.getElementById('trending-collapse-btn');

}

function setLayout(mode) {
  const grid = document.getElementById('grid');
  const compactBtn = document.getElementById('lt-compact');
  const comfyBtn = document.getElementById('lt-comfortable');
  if (mode === 'comfortable') {
    grid.classList.add('comfortable');
    compactBtn.classList.remove('active');
    comfyBtn.classList.add('active');
  } else {
    grid.classList.remove('comfortable');
    compactBtn.classList.add('active');
    comfyBtn.classList.remove('active');
  }
  try { localStorage.setItem(LAYOUT_KEY, mode); } catch(e) {}

function initLayout() {
  let saved = 'compact';
  try { saved = localStorage.getItem(LAYOUT_KEY) || 'compact'; } catch(e) {}
  setLayout(saved);
}

// ── Bias overrides ──
const BIAS_KEY = 'dailyten_bias';

function loadBiasOverrides() {
  try { return JSON.parse(localStorage.getItem(BIAS_KEY)) || {}; } catch(e) { return {}; }
}

function saveBiasOverride(id, label) {
  const overrides = loadBiasOverrides();
  overrides[id] = label;
  try { localStorage.setItem(BIAS_KEY, JSON.stringify(overrides)); } catch(e) {}
}

function getBiasLabel(src) {
  const overrides = loadBiasOverrides();
  return overrides[src.id] || src.bias;
}

function editBias(id) {
  const src = SOURCES.find(s => s.id === id);
  if (!src) return;
  const badge = document.getElementById(`bias-${id}`);
  if (!badge) return;
  const current = getBiasLabel(src);
  const wrap = badge.parentElement;
  // Replace badge with input
  const input = document.createElement('input');
  input.className = 'bias-input';
  input.value = current;
  input.maxLength = 30;
  wrap.replaceChild(input, badge);
  input.focus();
  input.select();
  function commit() {
    const val = input.value.trim() || src.bias;
    saveBiasOverride(id, val);
    renderBadge(src, wrap, val);
  }
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { input.blur(); }
    if (e.key === 'Escape') { input.value = current; input.blur(); }
  });
}

function renderBadge(src, container, label) {
  const badge = document.createElement('span');
  badge.className = 'bias-badge';
  badge.id = `bias-${src.id}`;
  badge.title = 'Click to edit bias label';
  badge.style.background = src.biasColor + '18';
  badge.style.color = src.biasColor;
  badge.style.borderColor = src.biasColor + '40';
  badge.textContent = label;
  badge.onclick = () => editBias(src.id);
  // Replace whatever is in container (input or old badge)
  const existing = container.querySelector('.bias-badge, .bias-input');
  if (existing) container.replaceChild(badge, existing);
  else container.appendChild(badge);
}

// ── Order management ──
const ORDER_KEY = 'dailyten_order';
const DEFAULT_ORDER = SOURCES.map(s => s.id);

function loadOrder() {
  // 1. Check URL param first
  const params = new URLSearchParams(window.location.search);
  const urlOrder = params.get('order');
  const urlHidden = params.get('hidden');

  // Apply hidden param to visibility if present
  if (urlHidden) {
    const vis = loadVisibility();
    urlHidden.split(',').forEach(id => { if (DEFAULT_ORDER.includes(id)) vis[id] = false; });
    saveVisibility(vis);
  }

  if (urlOrder) {
    const ids = urlOrder.split(',').filter(id => DEFAULT_ORDER.includes(id));
    DEFAULT_ORDER.forEach(id => { if (!ids.includes(id)) ids.push(id); });
    saveOrder(ids);
    return ids;
  }
  // 2. Fall back to localStorage
  try {
    const saved = JSON.parse(localStorage.getItem(ORDER_KEY));
    if (Array.isArray(saved) && saved.length) {
      const ids = saved.filter(id => DEFAULT_ORDER.includes(id));
      DEFAULT_ORDER.forEach(id => { if (!ids.includes(id)) ids.push(id); });
      return ids;
    }
  } catch(e) {}
  return [...DEFAULT_ORDER];
}

function saveOrder(ids) {
  try { localStorage.setItem(ORDER_KEY, JSON.stringify(ids)); } catch(e) {}
}

function getOrderedSources() {
  const order = loadOrder();
  return order
    .map(id => SOURCES.find(s => s.id === id))
    .filter(Boolean)
    .filter(s => isVisible(s.id));
}


function buildGrid() {
  const grid = document.getElementById('grid');
  const vis = loadVisibility();
  const order = loadOrder();
  const allOrdered = order.map(id => SOURCES.find(s => s.id === id)).filter(Boolean);
  grid.innerHTML = allOrdered.map(src => `
    <div class="card" id="card-${src.id}" draggable="true" data-id="${src.id}">
      <div class="card-header">
        <div class="drag-handle"><span></span><span></span><span></span></div>
        <div class="source-bar" style="background:${src.color}"></div>
        <span class="card-title">${src.name}</span>
        <span class="bias-wrap"></span>
        <a class="visit-link" href="${src.site}" target="_blank" rel="noopener">Visit ↗</a>
      </div>
      <div class="articles-wrap">
        <div class="state-msg">${vis[src.id] === false ? '' : 'Loading…'}</div>
      </div>
    </div>
  `).join('');
  // Render bias badges and apply saved visibility
  allOrdered.forEach(src => {
    const wrap = document.querySelector(`#card-${src.id} .bias-wrap`);
    if (wrap) renderBadge(src, wrap, getBiasLabel(src));
    const card = document.getElementById('card-' + src.id);
    if (card && vis[src.id] === false) card.style.display = 'none';
  });
  initDrag();
}

function initDrag() {
  const grid = document.getElementById('grid');
  let dragSrcId = null;

  grid.querySelectorAll('.card').forEach(card => {
    card.addEventListener('dragstart', e => {
      dragSrcId = card.dataset.id;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      grid.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over'));
    });
    card.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      grid.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over'));
      if (card.dataset.id !== dragSrcId) card.classList.add('drag-over');
    });
    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
    card.addEventListener('drop', e => {
      e.preventDefault();
      card.classList.remove('drag-over');
      if (!dragSrcId || dragSrcId === card.dataset.id) return;

      // Reorder in DOM
      const cards = [...grid.querySelectorAll('.card')];
      const srcEl = grid.querySelector(`[data-id="${dragSrcId}"]`);
      const tgtEl = card;
      const srcIdx = cards.indexOf(srcEl);
      const tgtIdx = cards.indexOf(tgtEl);
      if (srcIdx < tgtIdx) grid.insertBefore(srcEl, tgtEl.nextSibling);
      else grid.insertBefore(srcEl, tgtEl);

      // Persist new order
      const newOrder = [...grid.querySelectorAll('.card')].map(c => c.dataset.id);
      saveOrder(newOrder);
    });
  });
}

function setDateDisplay() {
  const now = new Date();
  const opts = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
  document.getElementById('date-display').textContent = now.toLocaleDateString('en-US', opts);
}

function loadAll() {
  const btn = document.getElementById('refresh-btn');
  btn.textContent = '↻ Refreshing…';
  btn.classList.add('spinning');
  breakingDismissed = false;
  allFeedsSettled = false;
  document.getElementById('breaking-bar').classList.remove('visible');
  // Clear prevLinks so this session starts fresh — only compare within same session
  savePrevLinks(new Set());
  store = {};
  buildGrid();
  setDateDisplay();
  updateSourceBtn();
  const ordered = getOrderedSources();
  if (ordered.length === 0) {
    btn.textContent = '↻ Refresh';
    btn.classList.remove('spinning');
    showEmptyState();
    return;
  }
  let pending = ordered.length;
  ordered.forEach((src, i) => {
    setTimeout(() => {
      fetchFeed(src).finally(() => {
        pending--;
        if (pending === 0) {
          btn.textContent = '↻ Refresh';
          btn.classList.remove('spinning');
          // Show last refreshed time in local timezone
          const now = new Date();
          const timeStr = now.toLocaleString('en-US', { hour:'numeric', minute:'2-digit', hour12:true });
          const el = document.getElementById('last-refreshed');
          if (el) el.textContent = 'Updated ' + timeStr;

          // All feeds have settled — snapshot every article link into prevLinks.
          // This is intentionally deferred until here: writing prevLinks per-feed
          // caused a race where Feed A's links were "prev" by the time Feed B's
          // checkBreaking() ran, making those articles invisible to the bar even
          // though they were genuinely new this session.
          const allLinks = new Set();
          SOURCES.forEach(s => {
            const d = store[s.id];
            if (d?.state === 'done') d.items.forEach(i => { if (i.link) allLinks.add(i.link); });
          });
          savePrevLinks(allLinks);
          allFeedsSettled = true;
        }
      });
    }, i < 3 ? 0 : (i - 2) * 300);
  });
}

// ── Breaking news bar ──
//
// Flow:
//   1. checkBreaking()    — full scan of all loaded feeds; builds a sorted match queue
//   2. renderBreakingBar() — pure DOM update from the current breakingMatches queue
//   3. markSeen(link)     — splices one item from the queue, re-renders without re-scanning
//
// Separating scan (checkBreaking) from render (renderBreakingBar) lets markSeen advance
// to the next headline instantly — no refresh needed, no re-querying localStorage.

const BREAKING_KW = [
  // Unambiguously alarming in any headline context
  'explosion','explosions','missile strike','missile attack','airstrike','air strike',
  'drone strike','drone attack','nuclear strike','nuclear attack',
  'ground invasion','invasion','invaded',
  'coup','assassinated','executed','execution','massacred','massacre','genocide',
  'ceasefire','blockade','evacuation',
  'hostage','hostages','bombed','bombing','shelling',
  'declares war','at war','wartime',
  'terror attack','terrorist attack',
  'mass casualties','mass shooting',
];

let breakingDismissed = false;
// Set to true once all feeds have settled in the current refresh cycle.
// While false, checkBreaking() ignores prevLinks so early-arriving feeds don't
// get their articles marked "old" before the batch snapshot is written.
let allFeedsSettled = false;
// In-memory queue of current breaking matches, newest first.
// Populated by checkBreaking(); drained by markSeen() as the user dismisses headlines.
let breakingMatches = [];

// Pure render — updates the bar DOM from whatever is currently in breakingMatches.
// Called by both checkBreaking() (after a full scan) and markSeen() (after a splice).
function renderBreakingBar() {
  const bar = document.getElementById('breaking-bar');
  if (breakingDismissed || breakingMatches.length === 0) {
    bar.classList.remove('visible');
    document.getElementById('breaking-dropdown').classList.remove('open');
    return;
  }

  const best = breakingMatches[0];
  document.getElementById('breaking-link').textContent = best.title;
  document.getElementById('breaking-link').href = best.link;
  document.getElementById('breaking-source').textContent = best.srcName;

  const moreBtn = document.getElementById('breaking-more');
  const dropdown = document.getElementById('breaking-dropdown');
  if (breakingMatches.length > 1) {
    moreBtn.textContent = `+${breakingMatches.length - 1} more`;
    moreBtn.style.display = '';
    dropdown.innerHTML = breakingMatches.slice(1).map(m => `
      <div class="breaking-drop-item">
        <a class="breaking-drop-title" href="${m.link.replace(/"/g,'&quot;')}" target="_blank" rel="noopener" style="color:#fff;text-decoration:none;flex:1;line-height:1.4;">${m.title}</a>
        <span class="breaking-drop-meta">${m.srcName}${m.pubDate ? ' · ' + relTime(m.pubDate) : ''}</span>
        <button onclick="event.stopPropagation();markSeen('${m.link.replace(/'/g,"\'")}'); this.closest('.breaking-drop-item').style.opacity='0.4'; this.textContent='✓';" style="background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:11px;padding:2px 8px;border-radius:3px;cursor:pointer;flex-shrink:0;margin-left:8px;">✓ Seen</button>
      </div>`).join('');
  } else {
    moreBtn.style.display = 'none';
    dropdown.classList.remove('open');
  }

  bar.classList.add('visible');
  // Force reflow to restart the pulse animation each time the bar updates
  bar.style.animation = 'none';
  bar.offsetHeight;
  bar.style.animation = '';
}

// Full scan — walks all loaded feeds and finds articles that are:
//   • published within the last 6 hours (recency cutoff — older articles aren't breaking)
//   • not in prevLinks  (i.e. genuinely new since the last refresh)
//   • not in seenLinks  (i.e. not manually dismissed by the user)
//   • contain a breaking keyword in the title
// Results are sorted newest-first and stored in breakingMatches, then rendered.
function checkBreaking() {
  if (breakingDismissed) return;
  const prevLinks = loadPrevLinks();
  const seenLinks = loadSeenLinks();
  const cutoff = Date.now() - 12 * 60 * 60 * 1000; // 12-hour recency window
  const matches = [];

  SOURCES.forEach(src => {
    if (!isVisible(src.id)) return;
    const data = store[src.id];
    if (data?.state !== 'done') return;
    data.items.forEach(item => {
      if (!item.link) return;
      if (seenLinks.has(item.link)) return;
      // Drop articles older than 6 hours — they're not breaking news
      if (item.pubDate && new Date(item.pubDate).getTime() < cutoff) return;
      // Before all feeds settle, ignore prevLinks so we don't prematurely mark
      // articles as old. After settling, prevLinks is the full batch snapshot and
      // it's safe to use it to suppress articles seen in the prior session.
      if (allFeedsSettled && prevLinks.has(item.link)) return;
      const text = item.title.toLowerCase();
      const hasKeyword = BREAKING_KW.some(k => {
        const re = new RegExp(`\\b${k}\\b`, 'i');
        return re.test(text);
      });
      if (hasKeyword) matches.push({ ...item, srcName: src.name });
    });
  });

  matches.sort((a, b) => {
    const da = a.pubDate ? new Date(a.pubDate).getTime() : 0;
    const db = b.pubDate ? new Date(b.pubDate).getTime() : 0;
    return db - da;
  });

  breakingMatches = matches;
  renderBreakingBar();
}

function toggleBreakingDropdown(e) {
  if (e) e.stopPropagation();
  const dropdown = document.getElementById('breaking-dropdown');
  const bar = document.getElementById('breaking-bar');
  const rect = bar.getBoundingClientRect();
  // Always position relative to current viewport position of bar
  dropdown.style.top = rect.bottom + 'px';
  dropdown.classList.toggle('open');
}

// Keep dropdown anchored when scrolling
window.addEventListener('scroll', () => {
  const dropdown = document.getElementById('breaking-dropdown');
  if (!dropdown.classList.contains('open')) return;
  const bar = document.getElementById('breaking-bar');
  const rect = bar.getBoundingClientRect();
  dropdown.style.top = rect.bottom + 'px';
}, { passive: true });

// Persists a link to seenLinks, then splices it from the in-memory queue and
// re-renders. The next headline promotes instantly — no full re-scan, no refresh.
function markSeen(link) {
  const seen = loadSeenLinks();
  seen.add(link);
  saveSeenLinks(seen);
  breakingMatches = breakingMatches.filter(m => m.link !== link);
  renderBreakingBar();
}

// "✓ Seen" on the main bar headline — reads the href directly from the DOM anchor.
// Guards against window.location.href in case the link hasn't been set yet.
function markSeenMain() {
  const link = document.getElementById('breaking-link').href;
  if (link && link !== window.location.href) markSeen(link);
}

// Hides the bar for this session only — does not persist to seenLinks,
// so the same articles will surface again on the next full refresh.
function dismissBreaking() {
  breakingDismissed = true;
  document.getElementById('breaking-bar').classList.remove('visible');
  document.getElementById('breaking-dropdown').classList.remove('open');
}


// Close breaking dropdown on outside click
document.addEventListener('click', e => {
  const bar = document.getElementById('breaking-bar');
  const dropdown = document.getElementById('breaking-dropdown');
  const moreBtn = document.getElementById('breaking-more');
  if (!bar.contains(e.target) && !dropdown.contains(e.target) && !moreBtn.contains(e.target)) {
    dropdown.classList.remove('open');
  }
});

// ── Story clustering ──
//
// Identifies stories covered by 3+ sources and groups them into topic cards.
// Key design decisions:
//   - Jaccard threshold 0.16 for phase 1 clustering (per-article similarity)
//   - Extended stop words include common news verbs (warns, urges, hits, etc.)
//     so they don't pollute token overlap and create false matches
//   - Post-clustering merge pass combines clusters whose top tokens overlap ≥50%,
//     eliminating near-duplicate cards like "Iran · Trump · Future" vs "Iran · Trump · Threats"
//   - Cluster title uses the most-recent headline text rather than word-frequency
//     labels, which is more readable and specific

const STOP_WORDS = new Set([
  // Articles, conjunctions, prepositions, pronouns — pure grammar words
  'the','a','an','and','or','but','in','on','at','to','for','of','with','by',
  'from','as','is','was','are','were','be','been','has','have','had','will',
  'would','could','should','may','might','that','this','these','those','its',
  'it','his','her','their','our','over','into','about','up','out','than','so',
  'not','no','us','un','eu','also','just','even','still','again','here','there',
  'within','ahead','before','since','while','between','amid',
  // News attribution verbs — appear in almost every headline, zero topical signal
  'says','say','said','warns','warn','urged','urges','urge','calls','call',
  'told','tell','shows','show','reports','report','claims','claim','according',
  'announces','announced',
]);

function tokenize(title) {
  return title.toLowerCase()
    .replace(/[^a-z0-9\s]/g, ' ')
    .split(/\s+/)
    .filter(w => w.length > 3 && !STOP_WORDS.has(w));
}

function jaccard(setA, setB) {
  const intersection = new Set([...setA].filter(x => setB.has(x)));
  const union = new Set([...setA, ...setB]);
  return union.size === 0 ? 0 : intersection.size / union.size;
}

// Returns the top N most frequent tokens across a cluster group
function topTokens(group, n = 5) {
  const freq = {};
  group.forEach(a => { a.tokens.forEach(t => { freq[t] = (freq[t] || 0) + 1; }); });
  return new Set(
    Object.entries(freq)
      .filter(([, c]) => c >= 2)
      .sort((a, b) => b[1] - a[1])
      .slice(0, n)
      .map(([w]) => w)
  );
}

function buildClusters() {
  const allArticles = [];
  SOURCES.forEach(src => {
    if (!isVisible(src.id)) return;
    const data = store[src.id];
    if (data?.state !== 'done') return;
    data.items
      .filter(item => passesFilter(item))
      .forEach(item => {
        allArticles.push({ ...item, srcId: src.id, srcName: src.name, srcColor: src.color, bias: src.bias });
      });
  });
  if (allArticles.length === 0) return [];

  const tokenized = allArticles.map(a => ({ ...a, tokens: new Set(tokenize(a.title)) }));
  const used = new Set();
  const clusters = [];

  // Phase 1: initial greedy clustering (Jaccard >= 0.20 per-article similarity)
  for (let i = 0; i < tokenized.length; i++) {
    if (used.has(i)) continue;
    const group = [tokenized[i]];
    used.add(i);
    for (let j = i + 1; j < tokenized.length; j++) {
      if (used.has(j)) continue;
      const similar = group.some(g => jaccard(g.tokens, tokenized[j].tokens) >= 0.20);
      if (similar) {
        const alreadyHasSrc = group.some(g => g.srcId === tokenized[j].srcId);
        if (!alreadyHasSrc) { group.push(tokenized[j]); used.add(j); }
      }
    }
    if (group.length >= 3) clusters.push(group);
  }

  // Phase 2: merge clusters whose top-5 tokens overlap by 50%+ (Jaccard >= 0.5)
  // This collapses near-duplicate cards that slipped through phase 1
  const merged = new Set();
  const mergedClusters = [];
  for (let i = 0; i < clusters.length; i++) {
    if (merged.has(i)) continue;
    const groupA = clusters[i];
    const tokA = topTokens(groupA);
    for (let j = i + 1; j < clusters.length; j++) {
      if (merged.has(j)) continue;
      const tokB = topTokens(clusters[j]);
      const overlap = jaccard(tokA, tokB);
      if (overlap >= 0.6) {
        // Merge B into A, deduplicating by source
        clusters[j].forEach(art => {
          if (!groupA.some(a => a.srcId === art.srcId)) groupA.push(art);
        });
        merged.add(j);
      }
    }
    mergedClusters.push(groupA);
  }

  // Sort by source count desc, then by most recent article
  mergedClusters.sort((a, b) => {
    if (b.length !== a.length) return b.length - a.length;
    const latestA = Math.max(...a.map(x => x.pubDate ? new Date(x.pubDate).getTime() : 0));
    const latestB = Math.max(...b.map(x => x.pubDate ? new Date(x.pubDate).getTime() : 0));
    return latestB - latestA;
  });

  return mergedClusters.slice(0, 8);
}

// Use the most recent article's headline as the cluster title — more readable
// and specific than the word-frequency label it replaces
function clusterTopic(group) {
  const withDate = group.filter(a => a.pubDate);
  const mostRecent = withDate.length
    ? withDate.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate))[0]
    : group[0];
  // Trim to ~65 chars at a word boundary
  const title = mostRecent.title;
  if (title.length <= 65) return title;
  const trimmed = title.slice(0, 65);
  return trimmed.slice(0, trimmed.lastIndexOf(' ')) + '…';
}

// Bias order for sorting headlines within a cluster — left to right on the spectrum
const BIAS_ORDER = {
  'Far Left': 0, 'Left': 1, 'Center-Left': 2, 'Center': 3, 'Aggregator': 3,
  'Center-Right': 4, 'Right': 5, 'Far Right': 6,
  'Libertarian': 4, 'Anti-Interventionist': 3,
  'Pro-Kremlin': 6, 'Pro-Iran State': 6, 'Chinese State Wire': 6,
  'Independent / Hong Kong': 3, 'Independent / MENA': 3,
  'Industry / Trade': 3, 'Center / Industry': 3,
  'Industry / Data': 3, 'Government / Data': 3,
  'Local News': 3, 'Sports': 3,
};

function biasRank(bias) {
  return BIAS_ORDER[bias] ?? 3;
}

function biasSpectrumHTML(group) {
  const sorted = [...group].sort((a, b) => biasRank(a.bias) - biasRank(b.bias));
  const segs = sorted.map(a => {
    const src = SOURCES.find(s => s.id === a.srcId);
    const color = src?.biasColor || a.srcColor;
    return '<div class="cluster-spectrum-seg" style="background:' + color + ';flex:1" title="' + a.srcName + ' — ' + (src?.bias || 'Unknown') + '"></div>';
  }).join('');
  return '<div class="cluster-spectrum">' + segs + '</div>';
}

function coverageBadgeHTML(group) {
  const seen = new Map();
  [...group]
    .sort((a, b) => biasRank(a.bias) - biasRank(b.bias))
    .forEach(a => {
      const src = SOURCES.find(s => s.id === a.srcId);
      if (src && !seen.has(src.bias)) seen.set(src.bias, src.biasColor);
    });
  if (seen.size <= 1) return '';
  const pips = [...seen.entries()].map(([label, color]) =>
    '<span class="cluster-coverage-pip" style="background:' + color + '" title="' + label + '"></span>' + label
  ).join(' · ');
  return '<div class="cluster-coverage">' + pips + '</div>';
}

function toggleClusterMore(cardId, btn) {
  const more = document.getElementById(cardId + '-more');
  if (!more) return;
  const isHidden = more.style.display === 'none';
  more.style.display = isHidden ? '' : 'none';
  const count = more.querySelectorAll('.cluster-headline').length;
  btn.textContent = isHidden
    ? 'Show less'
    : '+' + count + ' more perspective' + (count > 1 ? 's' : '');
}

function renderClusters() {
  const clusters = buildClusters();
  const section = document.getElementById('trending-section');
  const container = document.getElementById('clusters');
  const sub = document.getElementById('trending-sub');

  if (clusters.length === 0) { section.style.display = 'none'; return; }

  section.style.display = 'block';
  sub.textContent = clusters.length + ' stories covered by 3+ sources';
  const badge = document.getElementById('trending-collapsed-badge');
  if (badge) badge.textContent = clusters.length + ' stories';

  container.innerHTML = clusters.map(group => {
    const topic = clusterTopic(group);
    const biasSorted = [...group].sort((a, b) => biasRank(a.bias) - biasRank(b.bias));
    const mostRecent = [...group]
      .filter(a => a.pubDate)
      .sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate))[0] || group[0];
    const timeStr = mostRecent?.pubDate ? relTime(mostRecent.pubDate) : '';
    const cardId = 'cluster-' + Math.random().toString(36).slice(2, 7);
    const VISIBLE = 5;

    const makeHeadlineHTML = function(a) {
      const src = SOURCES.find(s => s.id === a.srcId);
      const biasLabel = src?.bias || '';
      const safeLink = a.link.replace(/"/g, '&quot;');
      return '<a class="cluster-headline" href="' + safeLink + '" target="_blank" rel="noopener">' +
        '<div class="cluster-dot" style="background:' + (src?.biasColor || a.srcColor) + '"></div>' +
        '<div>' +
        '<div class="cluster-hl-text">' + a.title + '</div>' +
        '<div class="cluster-hl-source">' + a.srcName + '<span class="cluster-hl-bias"> · ' + biasLabel + '</span></div>' +
        '</div>' +
        '</a>';
    };

    const visibleHTML = biasSorted.slice(0, VISIBLE).map(makeHeadlineHTML).join('');
    const hiddenHTML  = biasSorted.slice(VISIBLE).map(makeHeadlineHTML).join('');
    const extraCount  = biasSorted.length - VISIBLE;

    const moreToggle = extraCount > 0
      ? '<div id="' + cardId + '-more" style="display:none">' + hiddenHTML + '</div>' +
        '<button class="cluster-more-btn" onclick="toggleClusterMore(\'' + cardId + '\', this)">+' + extraCount + ' more perspective' + (extraCount > 1 ? 's' : '') + '</button>'
      : '';

    return '<div class="cluster-card">' +
      '<div class="cluster-topic">' + topic + '</div>' +
      '<div class="cluster-meta">' +
        '<span class="cluster-source-count">' + group.length + ' sources</span>' +
        '<span>' + timeStr + '</span>' +
      '</div>' +
      biasSpectrumHTML(group) +
      coverageBadgeHTML(group) +
      '<div class="cluster-headlines">' + visibleHTML + moreToggle + '</div>' +
    '</div>';
  }).join('');
}

// ── Bible Verse of the Day (labs.bible.org, NET translation) ──
const VERSE_KEY = 'upstream_verse';

async function fetchVerse() {
  try {
    const res = await fetch('https://labs.bible.org/api/?passage=votd&type=json', { signal: AbortSignal.timeout(8000) });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();
    const verses = Array.isArray(d) ? d : [d];
    if (!verses.length || !verses[0].text) throw new Error('empty');
    const text = verses.map(v => v.text.replace(/<[^>]+>/g, '').trim()).join(' ');
    const first = verses[0];
    const last  = verses[verses.length - 1];
    const ref   = (first.chapter === last.chapter && first.verse === last.verse)
      ? first.bookname + ' ' + first.chapter + ':' + first.verse
      : first.bookname + ' ' + first.chapter + ':' + first.verse + '-' + last.verse;
    const today = new Date().toISOString().slice(0, 10);
    localStorage.setItem(VERSE_KEY, JSON.stringify({ text, ref, date: today }));
    renderVerse(text, ref);
  } catch(e) {
    document.getElementById('verse-text').textContent = 'Verse unavailable';
    console.warn('[Verse] fetch failed:', e);
  }
}

function renderVerse(text, ref) {
  document.getElementById('verse-text').textContent = text;
  document.getElementById('verse-ref').textContent  = ref;
}

function initVerse() {
  try {
    const cached = JSON.parse(localStorage.getItem(VERSE_KEY));
    const today  = new Date().toISOString().slice(0, 10);
    if (cached?.date === today && cached.text) { renderVerse(cached.text, cached.ref); return; }
  } catch(e) {}
  fetchVerse();
}

// ── Weather widget (Open-Meteo) ──
var WEATHER_LOC_KEY = 'upstream_weather_loc';

function loadWeatherLoc() {
  try {
    const raw = localStorage.getItem(WEATHER_LOC_KEY);
    const saved = JSON.parse(raw);
    if (saved && saved.lat && saved.lon) return saved;
  } catch(e) { console.warn('[Weather] localStorage read error:', e); }
  return { lat: 29.7604, lon: -95.3698, name: 'Houston, TX' };
}

function saveWeatherLoc(loc) {
  try {
    localStorage.setItem(WEATHER_LOC_KEY, JSON.stringify(loc));
  } catch(e) { console.warn('[Weather] localStorage write failed:', e); }
}

function buildWeatherURL(lat, lon) {
  return 'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon +
    '&current=temperature_2m,weather_code' +
    '&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max' +
    '&temperature_unit=fahrenheit&timezone=auto&forecast_days=1';
}

function weatherIcon(code) {
  if (code === 0)  return String.fromCodePoint(0x2600,0xFE0F);
  if (code <= 2)   return String.fromCodePoint(0x26C5);
  if (code === 3)  return String.fromCodePoint(0x2601,0xFE0F);
  if (code <= 49)  return String.fromCodePoint(0x1F32B,0xFE0F);
  if (code <= 57)  return String.fromCodePoint(0x1F326,0xFE0F);
  if (code <= 67)  return String.fromCodePoint(0x1F327,0xFE0F);
  if (code <= 77)  return String.fromCodePoint(0x2744,0xFE0F);
  if (code <= 82)  return String.fromCodePoint(0x1F326,0xFE0F);
  if (code <= 84)  return String.fromCodePoint(0x1F328,0xFE0F);
  if (code <= 99)  return String.fromCodePoint(0x26C8,0xFE0F);
  return String.fromCodePoint(0x1F321,0xFE0F);
}

async function fetchWeather() {
  const loc = loadWeatherLoc();
  try {
    const res = await fetch(buildWeatherURL(loc.lat, loc.lon), { signal: AbortSignal.timeout(8000) });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();
    if (!d.current || d.current.temperature_2m == null) throw new Error('Missing current data');
    if (!d.daily   || !d.daily.temperature_2m_max)      throw new Error('Missing daily data');
    const temp   = Math.round(d.current.temperature_2m);
    const code   = d.current.weather_code != null ? d.current.weather_code : 0;
    const hi     = Math.round(d.daily.temperature_2m_max[0]);
    const lo     = Math.round(d.daily.temperature_2m_min[0]);
    const precip = d.daily.precipitation_probability_max ? d.daily.precipitation_probability_max[0] : 0;
    document.getElementById('weather-icon').textContent     = weatherIcon(code);
    document.getElementById('weather-temp').textContent     = temp + '°F';
    document.getElementById('weather-hi-lo').textContent    = 'H ' + hi + '° · L ' + lo + '°';
    document.getElementById('weather-precip').textContent   = precip > 0 ? precip + '% precip' : '';
    document.getElementById('weather-loc-name').textContent = loc.name;
  } catch(e) {
    document.getElementById('weather-temp').textContent     = '--°';
    document.getElementById('weather-hi-lo').textContent    = 'Unavailable';
    console.warn('[Weather] fetch failed:', e.message, e);
  }
}

async function geocodeLocation(query) {
  const url = 'https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(query) + '&count=1&language=en&format=json';
  const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const d = await res.json();
  if (!d.results || !d.results.length) throw new Error('Location not found');
  const r = d.results[0];
  const name = [r.name, r.admin1, r.country_code].filter(Boolean).join(', ');
  return { lat: r.latitude, lon: r.longitude, name };
}

async function saveWeatherLocation() {
  const input = document.getElementById('weather-loc-input');
  const status = document.getElementById('weather-pop-status');
  const query = input.value.trim();
  if (!query) return;
  status.className = 'weather-pop-status';
  status.textContent = 'Searching...';
  try {
    const loc = await geocodeLocation(query);
    saveWeatherLoc(loc);
    status.textContent = 'Set to ' + loc.name;
    input.value = '';
    await fetchWeather();
    setTimeout(function() {
      document.getElementById('weather-popover').classList.remove('open');
      status.textContent = '';
    }, 1200);
  } catch(e) {
    status.className = 'weather-pop-status error';
    status.textContent = 'Location not found - try a city name';
  }
}

function toggleWeatherPopover(e) {
  e.stopPropagation();
  const pop = document.getElementById('weather-popover');
  const isOpen = pop.classList.toggle('open');
  if (isOpen) {
    const input = document.getElementById('weather-loc-input');
    const loc = loadWeatherLoc();
    input.placeholder = loc.name;
    setTimeout(function() { input.focus(); }, 50);
  }
}

document.addEventListener('click', function() {
  const pop = document.getElementById('weather-popover');
  if (pop) pop.classList.remove('open');
});

function initWeather() {
  fetchWeather();
  setInterval(fetchWeather, 60 * 60 * 1000);
}

initWeather();
initVerse();
</script>
</body>
</html>
